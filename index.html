<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prayer Times</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:transparent}
body{color:#fff7df;font:14px system-ui,-apple-system,Segoe UI,sans-serif}
.c{
  --g1:#102b23;--g2:#071211;--g3:#241507;
  --glow:#7c5b2488;--accent:#f8d878;--accent2:#e8b24a;--text:#fff7df;
  --stars:1;--starblur:0px;--moon:1;
  position:relative;width:325px;height:280px;border-radius:28px;padding:11px 15px;
  background:radial-gradient(circle at 0 0,var(--glow),transparent 40%),linear-gradient(145deg,var(--g1),var(--g2) 70%,var(--g3));
  box-shadow:0 18px 50px #0008;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
  color:var(--text);overflow:hidden;transition:color .6s,border-color .6s}
/* weather + day/night palettes */
.c[data-theme="clearDay"]  {--g1:#1d6a4e;--g2:#0a2a23;--g3:#3a2606;--glow:#ffcf6baa;--accent:#ffdf8e;--accent2:#edb43f;--text:#fff7df}
.c[data-theme="clearNight"]{--g1:#101a3c;--g2:#070b1c;--g3:#171340;--glow:#475ec0aa;--accent:#ecd49a;--accent2:#c9a85f;--text:#eef1ff}
.c[data-theme="cloudDay"]  {--g1:#2c3c3a;--g2:#161f1e;--g3:#23211b;--glow:#aebbb888;--accent:#ecd9a4;--accent2:#cbb578;--text:#f3f5f0}
.c[data-theme="cloudNight"]{--g1:#1b2533;--g2:#0a0f18;--g3:#161820;--glow:#61739480;--accent:#d8c89c;--accent2:#b0a074;--text:#eaedf4}
.c[data-theme="rain"]      {--g1:#16323f;--g2:#0a1a22;--g3:#0e2531;--glow:#5aa0c2aa;--accent:#bfe2f2;--accent2:#6fb6d8;--text:#eaf4fb}
.c[data-theme="snow"]      {--g1:#2a3a45;--g2:#16242c;--g3:#243039;--glow:#cfeaffcc;--accent:#eaf6ff;--accent2:#a9d2ea;--text:#f2f9ff}
.c[data-theme="fog"]       {--g1:#2b3331;--g2:#171c1b;--g3:#202624;--glow:#b8c2c088;--accent:#e2e6e0;--accent2:#aab0aa;--text:#eef1ee}
.c[data-theme="thunder"]   {--g1:#241b3c;--g2:#0c0a1a;--g3:#241228;--glow:#8a6cffaa;--accent:#dac9ff;--accent2:#9d7cff;--text:#efeaff}

/* sky background: stars + moon */
.sky{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.stars{opacity:var(--stars);filter:blur(var(--starblur));transition:opacity .8s,filter .8s}
.stars circle{fill:#fff}
.moon{opacity:var(--moon);transition:opacity .8s}
.mglow{fill:var(--accent);opacity:.06}
.mdisk{fill:url(#mg)}
.mlit{fill:#e7ecfb}
.mrim{fill:none;stroke:#cdd6f0;stroke-opacity:.42;stroke-width:1.2}

/* header */
.h{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px}
.hl{min-width:0;display:flex;align-items:center;gap:9px}
.e{min-width:0;font-size:11px;line-height:1.2;letter-spacing:.16em;text-transform:uppercase;color:color-mix(in srgb,var(--accent) 72%,#fff);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wx{font-size:13px;line-height:1;color:var(--text);opacity:.92;white-space:nowrap;display:flex;align-items:center;gap:4px;flex:none}
.wx .i{font-size:15px}

/* prayer panel */
.panel{position:relative;z-index:1}
.arc{display:block;width:100%;height:96px;margin:0;overflow:visible}
.foc{position:relative;text-align:center;margin-top:-26px}
.foc .nt{font-size:23px;line-height:1;font-weight:850;color:var(--accent)}
.foc .n{font-size:14px;line-height:1.15;font-weight:800;opacity:.9;margin-top:2px}
.arc .horizon{stroke:#ffffff;stroke-opacity:.16;stroke-width:1;stroke-dasharray:2.5 5}
.arc .rail{fill:none;stroke:#ffffff;stroke-opacity:.3;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.arc .warm{fill:none;stroke:var(--accent);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px var(--accent))}
.arc .dot{fill:#ffffff;fill-opacity:.72}
.arc .dot.next{fill:var(--accent)}
.arc .cur{fill:color-mix(in srgb,var(--g1) 55%,var(--g2));stroke:var(--accent);stroke-width:3}
.bar{height:6px;border-radius:6px;background:#ffffff1a;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .9s linear}
.left{display:block;text-align:center;margin-top:5px;color:var(--text);opacity:.78;font-size:11px;line-height:1.2}

/* prayer-times grid */
.times{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.p{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:3px 9px;border-radius:11px;background:#ffffff10;border:1px solid #ffffff14;transition:opacity .3s,background .3s}
.p.on{background:color-mix(in srgb,var(--accent) 16%,transparent);border-color:color-mix(in srgb,var(--accent) 45%,transparent)}
.p.past{opacity:.42}
.p b{font-weight:800;font-size:12.5px}
.tm{font-weight:850;font-size:12.5px}

/* dates */
.d{position:relative;z-index:1;direction:ltr;display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-top:5px;color:color-mix(in srgb,var(--text) 60%,transparent);font-size:11.5px;line-height:1.2}
.d span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{opacity:.55;font-size:.84em;margin:0 4px;letter-spacing:.05em;unicode-bidi:isolate}
</style>
</head>
<body>
<div class="c">
  <svg class="sky" viewBox="0 0 325 280" preserveAspectRatio="none" aria-hidden="true">
    <defs><radialGradient id="mg" cx="40%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#27334f"/><stop offset="65%" stop-color="#18223e"/><stop offset="100%" stop-color="#0e1630"/>
    </radialGradient></defs>
    <g class="stars">
      <circle cx="20" cy="45" r=".8" opacity=".55"/><circle cx="60" cy="75" r="1.1" opacity=".8"/>
      <circle cx="38" cy="140" r=".7" opacity=".5"/><circle cx="88" cy="50" r=".9" opacity=".65"/>
      <circle cx="110" cy="120" r=".7" opacity=".5"/><circle cx="135" cy="80" r="1" opacity=".75"/>
      <circle cx="150" cy="180" r=".7" opacity=".5"/><circle cx="175" cy="55" r=".8" opacity=".6"/>
      <circle cx="195" cy="130" r=".7" opacity=".5"/><circle cx="170" cy="160" r=".6" opacity=".45"/>
      <circle cx="215" cy="90" r="1.1" opacity=".8"/><circle cx="240" cy="160" r=".7" opacity=".5"/>
      <circle cx="262" cy="120" r=".9" opacity=".7"/><circle cx="285" cy="178" r=".7" opacity=".5"/>
      <circle cx="300" cy="208" r=".8" opacity=".6"/><circle cx="32" cy="205" r=".7" opacity=".5"/>
      <circle cx="75" cy="212" r=".6" opacity=".45"/><circle cx="120" cy="208" r=".8" opacity=".6"/>
      <circle cx="205" cy="200" r=".7" opacity=".5"/><circle cx="250" cy="212" r=".6" opacity=".45"/>
      <circle cx="15" cy="95" r=".7" opacity=".5"/><circle cx="100" cy="165" r=".7" opacity=".5"/>
      <circle cx="145" cy="40" r=".6" opacity=".45"/><circle cx="228" cy="140" r=".6" opacity=".45"/>
      <circle cx="50" cy="175" r=".8" opacity=".6"/><circle cx="90" cy="100" r=".7" opacity=".5"/>
      <circle cx="160" cy="205" r=".6" opacity=".45"/><circle cx="185" cy="95" r=".7" opacity=".55"/>
      <circle cx="270" cy="186" r=".7" opacity=".5"/><circle cx="130" cy="150" r=".6" opacity=".45"/>
    </g>
    <g class="moon" transform="translate(296 22)">
      <circle class="mglow" r="74"/>
      <circle class="mdisk" r="56"/>
      <path class="mlit" id="mlit"/>
      <circle class="mrim" r="56"/>
    </g>
  </svg>

  <div class="h">
    <div class="hl"><span class="e" id="loc"></span><span class="wx" id="wx"></span></div>
  </div>

  <div class="panel">
    <svg class="arc" viewBox="0 0 295 96" preserveAspectRatio="none"></svg>
    <div class="foc"><div class="nt">—</div><div class="n">—</div></div>
    <div class="bar"><i></i></div>
    <div class="left">Loading…</div>
  </div>

  <div class="times"></div>

  <div class="d"><span class="ce" id="ce"></span><span class="ah" id="ah"></span></div>
</div>

<script>
"use strict";
// ---- config from URL hash ------------------------------------------------
const q     = new URLSearchParams(location.hash.slice(1));
const lat   = q.get("lat");
const lon   = q.get("lon");
const tz    = q.get("tz")    || "America/New_York";
const label = q.get("label") || "";
const method= q.get("method")|| "2";
const school= q.get("school")|| "0";
const fmt24 = (q.get("time") || "24") !== "12";
const units = (q.get("units") || "f").toLowerCase() === "c" ? "c" : "f";
const datefmt = (q.get("datefmt") || "iso").toLowerCase();

const prayers = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
const real    = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

// ---- helpers -------------------------------------------------------------
const $    = s => document.querySelector(s);
const pad  = n => String(n).padStart(2,"0");
const enc  = encodeURIComponent;
const sleep= ms => new Promise(r=>setTimeout(r,ms));
const clamp= x => Math.min(1,Math.max(0,x));
const clean= t => String(t).replace(/\s*\(.+\)\s*/,"").trim();
const mins = t => { const [h,m]=clean(t).split(":").map(Number); return h*60+m; };
const fmt  = t => {
  const [h,m]=clean(t).split(":").map(Number);
  if(fmt24) return `${pad(h)}:${pad(m)}`;
  return `${h%12||12}:${pad(m)} ${h>=12?"PM":"AM"}`;
};
const dur = leftMin => {
  const s=Math.max(0,Math.round(leftMin*60)), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m`;
  return `${sec}s`;
};
const fmtDate = o => {
  if(!o) return "";
  const dd=pad(+o.day), mm=pad(+(o.month&&o.month.number||0)), yyyy=o.year, mon=(o.month&&o.month.en)||"";
  switch(datefmt){
    case "us":   return `${mm}/${dd}/${yyyy}`;
    case "eu":   return `${dd}/${mm}/${yyyy}`;
    case "long": return `${+o.day} ${mon} ${yyyy}`;
    default:     return `${yyyy}-${mm}-${dd}`;   // iso
  }
};

// current wall-clock in the *configured* timezone (not the browser's)
function nowParts(){
  try{
    const f=new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
    const p={}; for(const part of f.formatToParts(new Date())) p[part.type]=part.value;
    return {y:+p.year,mo:+p.month,d:+p.day,h:(+p.hour)%24,mi:+p.minute,s:+p.second,dateStr:`${p.day}-${p.month}-${p.year}`};
  }catch(e){
    const d=new Date();
    return {y:d.getFullYear(),mo:d.getMonth()+1,d:d.getDate(),h:d.getHours(),mi:d.getMinutes(),s:d.getSeconds(),dateStr:`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`};
  }
}
function tomorrowStr(){
  const n=nowParts();
  const d=new Date(Date.UTC(n.y,n.mo-1,n.d));
  d.setUTCDate(d.getUTCDate()+1);
  return `${pad(d.getUTCDate())}-${pad(d.getUTCMonth()+1)}-${d.getUTCFullYear()}`;
}

// ---- prayer-times data: fetch + cache + retry ---------------------------
const cacheKey = "salah:"+[lat,lon,tz,method,school].join("|");
function loadCache(dateStr){
  try{ const j=JSON.parse(localStorage.getItem(cacheKey)); if(j&&j.date===dateStr) return j.data; }catch(e){}
  return null;
}
function saveCache(dateStr,data){
  try{ localStorage.setItem(cacheKey,JSON.stringify({date:dateStr,data})); }catch(e){}
}
async function fetchTimings(dateStr){
  const u=`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${enc(lat)}&longitude=${enc(lon)}&method=${enc(method)}&school=${enc(school)}&timezonestring=${enc(tz)}`;
  let err;
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
      const j=await r.json();
      if(j&&j.data&&j.data.timings) return j.data;
      throw new Error("bad api");
    }catch(e){ err=e; if(i<2) await sleep(900*(i+1)); }
  }
  throw err;
}

// ---- weather (Open-Meteo: free, no key, CORS-enabled) -------------------
let weather=null, lastWxAt=0, lastWxTry=0, wxBusy=false;
const wxKey = "salahwx:"+[lat,lon,units].join("|");
function loadWx(){
  try{ const j=JSON.parse(localStorage.getItem(wxKey)); if(j && Date.now()-j.ts < 6*3600e3){ weather=j.w; lastWxAt=j.ts; } }catch(e){}
}
async function fetchWeather(){
  if(!lat||!lon||wxBusy) return;
  const now=Date.now();
  if(weather && now-lastWxAt < 15*60*1000) return;
  if(now-lastWxTry < 60*1000) return;
  lastWxTry=now; wxBusy=true;
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${enc(lat)}&longitude=${enc(lon)}&current=temperature_2m,weather_code&temperature_unit=${units==="c"?"celsius":"fahrenheit"}&timezone=${enc(tz)}`;
  try{
    const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
    const j=await r.json();
    if(j&&j.current&&j.current.weather_code!=null){
      weather={code:j.current.weather_code, temp:Math.round(j.current.temperature_2m)};
      lastWxAt=Date.now();
      try{ localStorage.setItem(wxKey,JSON.stringify({w:weather,ts:lastWxAt})); }catch(e){}
    }
  }catch(e){}
  finally{ wxBusy=false; }
}
function wxInfo(code, day){
  const c=code;
  if(c==null||c===0)   return {cond:"clear",   icon:day?"☀️":"🌙", label:day?"Clear":"Clear night"};
  if(c===1||c===2)     return {cond:"cloud",   icon:day?"⛅":"☁️", label:"Partly cloudy"};
  if(c===3)            return {cond:"cloud",   icon:"☁️",  label:"Overcast"};
  if(c===45||c===48)   return {cond:"fog",     icon:"🌫️", label:"Fog"};
  if(c>=51&&c<=57)     return {cond:"rain",    icon:"🌦️", label:"Drizzle"};
  if(c>=61&&c<=67)     return {cond:"rain",    icon:"🌧️", label:"Rain"};
  if(c>=71&&c<=77)     return {cond:"snow",    icon:"🌨️", label:"Snow"};
  if(c>=80&&c<=82)     return {cond:"rain",    icon:"🌦️", label:"Showers"};
  if(c===85||c===86)   return {cond:"snow",    icon:"🌨️", label:"Snow showers"};
  if(c>=95)            return {cond:"thunder", icon:"⛈️", label:"Thunderstorm"};
  return {cond:"clear", icon:day?"☀️":"🌙", label:"—"};
}

// ---- moon phase (synodic) ------------------------------------------------
function moonPhase(date){
  const synodic=29.530588853;
  const ref=Date.UTC(2000,0,6,18,14,0)/86400000;        // known new moon
  const now=date.getTime()/86400000;
  const phase=(((now-ref)%synodic)+synodic)%synodic/synodic;   // 0 new .. .5 full .. 1 new
  const frac=(1-Math.cos(2*Math.PI*phase))/2;            // illuminated fraction
  return {phase, frac, waxing:phase<0.5};
}
// SVG path for the lit region of a moon of radius R, centred at the origin
function moonLit(R, frac, waxing){
  frac=clamp(frac);
  const rx=R*Math.abs(1-2*frac);                          // terminator half-width
  const limb=waxing?1:0;                                  // bright limb on right(1)/left(0)
  const term=waxing?(frac<0.5?0:1):(frac<0.5?1:0);        // crescent hugs the limb, gibbous bulges away
  return `M0 ${-R} A${R} ${R} 0 0 ${limb} 0 ${R} A${rx.toFixed(2)} ${R} 0 0 ${term} 0 ${-R} Z`;
}
function renderMoon(){
  const mp=moonPhase(new Date());
  $("#mlit").setAttribute("d", moonLit(56, mp.frac, mp.waxing));
}

// ---- state ---------------------------------------------------------------
let today=null, tomorrow=null, lastDate=null, fetchingTomorrow=false;
$("#loc").textContent = label;
$("#loc").style.display = label ? "" : "none";

function showError(msg){ $(".n").textContent="—"; $(".nt").textContent="—"; $(".left").textContent=msg; }
function isDayNow(nowMin){
  if(!today) return true;
  const sr=mins(today.timings.Sunrise), ss=mins(today.timings.Sunset||today.timings.Maghrib);
  return nowMin>=sr && nowMin<ss;
}

// build everything render() needs, in tz minutes
function model(){
  const n=nowParts(), nowMin=n.h*60+n.mi+n.s/60, t=today.timings;
  const noon=mins(t.Dhuhr), start=noon-720;
  const norm=x=>{ while(x<start)x+=1440; while(x>=start+1440)x-=1440; return x; };
  const list=real.map(k=>({k,m:mins(t[k]),t:t[k]}));
  const i=list.findIndex(x=>x.m>nowMin);
  let next, nextMin, prevMin, tomorrowFlag;
  if(i>=0){ next=list[i]; nextMin=next.m; prevMin=i>0?list[i-1].m:list[list.length-1].m-1440; tomorrowFlag=false; }
  else { const ft=tomorrow?tomorrow.timings.Fajr:t.Fajr; next={k:"Fajr",t:ft,m:mins(ft)}; nextMin=mins(ft)+1440; prevMin=list[list.length-1].m; tomorrowFlag=true; }
  let cur="Isha"; for(const k of real){ if(mins(t[k])<=nowMin) cur=k; }
  return {
    t, noon, sunrise:norm(mins(t.Sunrise)), sunset:norm(mins(t.Sunset||t.Maghrib)),
    nowMin, nowAbs:norm(nowMin), warmEnd: tomorrowFlag ? start+1440 : norm(next.m),
    dots: prayers.map(k=>({k, abs:norm(mins(t[k]))})),
    currentKey:cur, nextKey:next.k, nextTime:next.t,
    leftMin:nextMin-nowMin, progress:clamp((nowMin-prevMin)/(nextMin-prevMin)),
    needTomorrow:tomorrowFlag
  };
}

// draw the solar-prayer arc
function drawArc(M){
  const W=295,H=96,hY=54,Ad=46,An=28,R=4, start=M.noon-720;
  const X=a=>(a-start)/1440*W;
  const ALT=a=>{
    if(a<=M.sunrise){ const f=(a-start)/(M.sunrise-start); return -An*Math.cos(f*Math.PI/2); }
    if(a<=M.sunset){  const f=(a-M.sunrise)/(M.sunset-M.sunrise); return Ad*Math.sin(f*Math.PI); }
    const f=(a-M.sunset)/((start+1440)-M.sunset); return -An*Math.sin(f*Math.PI/2);
  };
  const Y=a=>hY-ALT(a);
  const pathFrom=(a0,a1,steps)=>{
    let d=""; for(let i=0;i<=steps;i++){ const a=a0+(a1-a0)*i/steps; d+=`${i?"L":"M"}${X(a).toFixed(1)} ${Y(a).toFixed(1)}`; } return d;
  };
  const rail=pathFrom(start,start+1440,120);
  // elapsed portion of the day, filled in accent up to "now" (like the progress bar)
  const elapsed=pathFrom(start,M.nowAbs,Math.max(2,Math.round((M.nowAbs-start)/12)));
  let dots="";
  for(const p of M.dots){
    const cls = (p.k===M.nextKey && !M.needTomorrow) ? "dot next" : "dot";
    dots+=`<circle class="${cls}" cx="${X(p.abs).toFixed(1)}" cy="${Y(p.abs).toFixed(1)}" r="${R}"/>`;
  }
  const cur=`<circle class="cur" cx="${X(M.nowAbs).toFixed(1)}" cy="${Y(M.nowAbs).toFixed(1)}" r="5"/>`;
  return `<line class="horizon" x1="0" y1="${hY}" x2="${W}" y2="${hY}"/>`+
         `<path class="rail" d="${rail}"/><path class="warm" d="${elapsed}"/>${dots}${cur}`;
}

function applyTheme(nowMin){
  const day=isDayNow(nowMin);
  const info=wxInfo(weather?weather.code:null, day);
  const key=(info.cond==="clear"||info.cond==="cloud") ? info.cond+(day?"Day":"Night") : info.cond;
  const c=$(".c"); c.dataset.theme=key;
  const el=$("#wx"); el.title=info.label;
  el.innerHTML = `<span class="i">${info.icon}</span>` + (weather ? `${weather.temp}°` : "");
  // sky reactivity
  let stars=0.8, blur=0, moon=1;
  if(day){ stars=0; blur=0; moon=0.12; }
  else switch(info.cond){
    case "clear":   stars=1;    blur=0;   moon=1;   break;
    case "cloud":   stars=0.4;  blur=0.7; moon=0.7; break;
    case "fog":     stars=0.18; blur=1.4; moon=0.5; break;
    case "rain":    stars=0.12; blur=0.9; moon=0.55;break;
    case "snow":    stars=0.5;  blur=0.6; moon=0.7; break;
    case "thunder": stars=0.22; blur=0.8; moon=0.5; break;
  }
  c.style.setProperty("--stars",stars);
  c.style.setProperty("--starblur",blur+"px");
  c.style.setProperty("--moon",moon);
}

function render(){
  if(!today) return;
  const M=model();
  if(M.needTomorrow && !tomorrow && !fetchingTomorrow){
    fetchingTomorrow=true;
    fetchTimings(tomorrowStr()).then(d=>{tomorrow=d;fetchingTomorrow=false;}).catch(()=>{fetchingTomorrow=false;});
  }
  $(".n").textContent  = M.nextKey;
  $(".nt").textContent = fmt(M.nextTime);
  $(".left").textContent = `${dur(M.leftMin)} left`;
  $(".bar>i").style.width = (M.progress*100).toFixed(1)+"%";
  $(".arc").innerHTML = drawArc(M);
  $(".times").innerHTML = prayers.map(k=>{
    const on   = k===M.nextKey && !M.needTomorrow;
    const past = mins(M.t[k])<=M.nowMin && !on;
    return `<div class="p ${on?"on":""} ${past?"past":""}"><b>${k}</b><span class="tm">${fmt(M.t[k])}</span></div>`;
  }).join("");
  const g=today.date&&today.date.gregorian, h=today.date&&today.date.hijri;
  $("#ce").innerHTML = g ? `${fmtDate(g)}<span class="er">CE</span>` : "";
  $("#ah").innerHTML = h ? `<span class="er">ه</span>${fmtDate(h)}` : "";
  applyTheme(M.nowMin);
}

function tick(){
  const n=nowParts();
  if(lastDate && n.dateStr!==lastDate){           // crossed midnight → load the new day
    tomorrow=null; renderMoon();
    fetchTimings(n.dateStr).then(d=>{today=d;saveCache(n.dateStr,d);}).catch(()=>{});
  }
  lastDate=n.dateStr;
  fetchWeather();
  render();
}

async function boot(){
  renderMoon();
  if(!lat||!lon){ showError("Add lat & lon to the URL"); return; }
  loadWx();
  fetchWeather();
  const ds=nowParts().dateStr;
  const cached=loadCache(ds);
  if(cached){ today=cached; lastDate=ds; render(); }
  try{
    today=await fetchTimings(ds);
    saveCache(ds,today);
    lastDate=ds;
    render();
  }catch(e){
    if(!today) showError("Could not load prayer times");
  }
  setInterval(tick,1000);
}

boot();
</script>
</body>
</html>
