<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prayer Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600&display=swap">
<style>
*{box-sizing:border-box}
html,body{margin:0;background:transparent}
body{color:#fff7df;
  --font-body:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-display:"Fraunces",Georgia,"Times New Roman",serif;
  font:14px var(--font-body);font-optical-sizing:auto;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.c{
  --g1:#0b1430;--g2:#070a1c;--g3:#0d1024;
  --glow:rgba(70,90,180,0);--horizon:rgba(40,40,90,0);--sunx:50%;--suny:30%;
  --accent:#f8d878;--accent2:#e8b24a;--text:#fff7df;
  --stars:1;--starblur:0px;--moon:1;
  --glass:inset 0 1px .5px #ffffff45,inset 0 -2px 5px #00000017,0 3px 8px #0000001f;
  position:relative;width:325px;height:530px;border-radius:28px;padding:15px;
  background:linear-gradient(160deg,var(--g1),var(--g2) 55%,var(--g3));
  box-shadow:0 18px 50px #0008;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
  color:var(--text);overflow:hidden}
/* register the sky/light custom props as typed so applyTheme()'s per-second writes INTERPOLATE
   instead of snapping — continuous time/weather colour transitions for free (Baseline 2024). */
@property --g1{syntax:"<color>";inherits:true;initial-value:#0b1430}
@property --g2{syntax:"<color>";inherits:true;initial-value:#070a1c}
@property --g3{syntax:"<color>";inherits:true;initial-value:#0d1024}
@property --accent{syntax:"<color>";inherits:true;initial-value:#f8d878}
@property --accent2{syntax:"<color>";inherits:true;initial-value:#e8b24a}
@property --text{syntax:"<color>";inherits:true;initial-value:#fff7df}
@property --glow{syntax:"<color>";inherits:true;initial-value:rgba(70,90,180,0)}
@property --horizon{syntax:"<color>";inherits:true;initial-value:rgba(40,40,90,0)}
@property --sunx{syntax:"<length-percentage>";inherits:true;initial-value:50%}
@property --suny{syntax:"<length-percentage>";inherits:true;initial-value:30%}
@media (prefers-reduced-motion:no-preference){
  .c{transition:--g1 1.1s linear,--g2 1.1s linear,--g3 1.1s linear,--accent 1.1s linear,--accent2 1.1s linear,--text 1.1s linear,--glow 1.1s linear,--horizon 1.1s linear,--sunx 1.1s linear,--suny 1.1s linear}
}

/* atmosphere: additive (screen) light driven by the sun's trajectory — a Mie
   forward-scatter bloom at the sun, and a Rayleigh horizon band that pools under
   the sun's azimuth (left at dawn, right at dusk). No discrete "rays": clear-sky
   scattering is smooth; shafts only read through cloud (see .godray). */
.atmo{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;border-radius:28px;mix-blend-mode:screen}
.atmo .sun{position:absolute;left:var(--sunx);top:var(--suny);width:360px;height:360px;transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--glow),transparent 64%);filter:blur(6px)}
.atmo .scatter{position:absolute;inset:0;background:radial-gradient(150% 96% at var(--sunx) 127%,var(--horizon),transparent 62%)}
.atmo .belt{position:absolute;inset:0;background:radial-gradient(135% 26% at var(--antix,50%) 120%,var(--belt,transparent),transparent 72%)}  /* Belt of Venus (anti-solar pink, civil twilight) */
/* filmic grain / atmospheric noise — kills gradient banding, adds texture */
.grain{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;mix-blend-mode:soft-light}
/* heat/cold climate cues — soft-light tints + a frost vignette, all behind the foreground (z-index 0)
   so only the SKY is tinted, never the prayer panel/text. Driven by --warm/--cool/--frost from the
   apparent-temperature (feels-like) weather driver. */
.climate{position:absolute;inset:0;z-index:0;pointer-events:none;border-radius:28px;overflow:hidden}
.climate>div{position:absolute;inset:0;transition:opacity 1.6s ease}
.climate .tintw{background:#ff9a3c;mix-blend-mode:soft-light;opacity:var(--warm,0)}
.climate .tintc{background:#7fb0ff;mix-blend-mode:soft-light;opacity:var(--cool,0)}
.climate .frost{background:radial-gradient(125% 95% at 50% 46%,transparent 50%,#cfe6ff 128%);mix-blend-mode:screen;opacity:var(--frost,0)}
/* heat-haze: a warm convection band that rises + wobbles low in the sky when it's hot (alpha+wobble
   scale with --heat, so it vanishes entirely when cold). Cheap transform/opacity only. */
.climate .heatwave{top:auto;height:42%;background:linear-gradient(0deg,rgba(255,206,150,calc(.13*var(--heat,0))),transparent 85%);mix-blend-mode:soft-light;will-change:transform}
@media (prefers-reduced-motion:no-preference){.climate .heatwave{animation:heatwave 3.1s ease-in-out infinite}}
@keyframes heatwave{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(calc(-2px*var(--heat,0))) scaleY(calc(1 + .03*var(--heat,0)))}}
/* top metadata scrim — protects the location/weather header from dissolving into the cloud
   texture; only revealed in busy weather, so clear skies stay clean (no darkening). */
.scrim{position:absolute;top:0;left:0;right:0;height:64px;z-index:1;pointer-events:none;opacity:0;transition:opacity .9s;
  background:linear-gradient(180deg,rgba(8,11,20,.5),rgba(8,11,20,.2) 52%,transparent)}
.c[data-fx=cloud] .scrim,.c[data-fx=overcast] .scrim,.c[data-fx=fog] .scrim,.c[data-fx=drizzle] .scrim,.c[data-fx=rain] .scrim,.c[data-fx=thunder] .scrim,.c[data-fx=snow] .scrim{opacity:1}

/* sky background: stars + moon */
.sky{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.stars{opacity:var(--stars);filter:blur(var(--starblur));transition:opacity .8s,filter .8s}
/* per-star twinkle subtracts its own --amp from its own base opacity --o (set inline by buildStars),
   so each star scintillates independently at its own phase/rate instead of in lockstep */
@keyframes tw{0%,100%{opacity:var(--o,.85)}50%{opacity:calc(var(--o,.85) - var(--amp,.18))}}
@media (prefers-reduced-motion:reduce){.stars circle{animation:none!important}}
.moon{opacity:1}
.moccluder{fill:var(--moon-sky,#0b1430);opacity:var(--moonocc,1);transition:opacity .9s}  /* opaque only when stars are out (hides them); 0 in daylight so no ghost moon by day */
.mfeatures{opacity:var(--moonfeat,1);transition:opacity .9s}
.mcorona{fill:none;stroke:#eef0ff;stroke-width:0;mix-blend-mode:screen;filter:blur(10px);opacity:0;transition:opacity 1.2s,stroke-width 1.2s}  /* humidity-driven lunar corona */
.mglow{fill:#dfe6f2;filter:blur(7px);mix-blend-mode:screen}
.mdisk{fill:url(#mg)}
.mshine{fill:#3c465c}                               /* earthshine: cool ash-grey on the dark limb */
.mrim{fill:none;stroke:#d6d0c2;stroke-opacity:.3;stroke-width:1}

/* weather effects: animated overlay, behind the foreground (z-index 1) */
.wfx{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;border-radius:28px}
.wfx .veil{position:absolute;inset:0;opacity:0;transition:opacity .9s;
  background:linear-gradient(180deg,#262e3600,#222831 96%)}
.wfx .clouds{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity 1s}
.cloudg{will-change:transform}
/* drift speed comes from the wind (--cloud-dur-a/b set per poll); a gust flickers the front layer's
   opacity (--gust); the two layers drift at a non-integer ratio + a touch of vertical creep so the
   overlap pattern never repeats — clouds that actually evolve instead of "always the same clouds". */
.cloudg-a{animation:cloudA var(--cloud-dur-a,80s) ease-in-out infinite, gust calc(2.5s + 5s*(1 - var(--gust,0))) ease-in-out infinite}
.cloudg-b{opacity:.6;animation:cloudB var(--cloud-dur-b,130s) ease-in-out infinite}
.wfx .sunhaze{position:absolute;left:var(--sunx);top:var(--suny);width:300px;height:300px;transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--glow),transparent 56%);mix-blend-mode:screen;filter:blur(7px);opacity:0;transition:opacity 1s}
.wfx .fog{position:absolute;left:-22%;right:-22%;height:48px;opacity:0;filter:blur(9px);transition:opacity 1s;will-change:transform;
  background:linear-gradient(90deg,transparent,#cdd3d9b3 45%,#cdd3d966 60%,transparent);animation:fogdrift linear infinite}
.wfx .drop{position:absolute;top:-10%;width:1.5px;height:14px;border-radius:2px;display:none;will-change:transform;
  background:linear-gradient(#b9dcf500,#b9dcf5cc);animation:fall linear infinite}
.wfx .flake{position:absolute;top:-6%;border-radius:50%;display:none;background:#eef4ff;box-shadow:0 0 3px #dfeaffaa;will-change:transform;animation:snowfall linear infinite}
.wfx .flash{position:absolute;inset:0;opacity:0;
  background:radial-gradient(circle at 68% 14%,#dfe2ffe6,#b9b0ff66 28%,transparent 58%)}
.wfx .bolt{position:absolute;inset:0;width:100%;height:100%;opacity:0}
.wfx .bolt path{fill:none;stroke:#eef0ff;stroke-width:2;stroke-linejoin:round;stroke-linecap:round;filter:drop-shadow(0 0 4px #cfd2ff)}
@keyframes cloudA{0%{transform:translate(calc(var(--wind-dir,1)*-42px),0)}50%{transform:translate(calc(var(--wind-dir,1)*46px),-6px)}100%{transform:translate(calc(var(--wind-dir,1)*-42px),0)}}
@keyframes cloudB{0%{transform:translate(calc(var(--wind-dir,1)*40px),0)}50%{transform:translate(calc(var(--wind-dir,1)*-38px),5px)}100%{transform:translate(calc(var(--wind-dir,1)*40px),0)}}
@keyframes gust{0%,100%{opacity:1}50%{opacity:calc(1 - .22*var(--gust,0))}}
/* continuous "alive" cues so a clear sky is never static: the Mie bloom breathes, the Rayleigh
   scatter band drifts laterally. GPU transform/opacity only; gated to clear/cloud + reduced-motion. */
@media (prefers-reduced-motion:no-preference){
  .c[data-fx=clear] .atmo .sun,.c[data-fx=cloud] .atmo .sun{animation:breathe var(--breathe-dur,9s) ease-in-out infinite}
  .c[data-fx=clear] .atmo .scatter{animation:scatterdrift 23s ease-in-out infinite}
}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.84}50%{transform:translate(-50%,-50%) scale(1.13);opacity:1}}
@keyframes scatterdrift{0%,100%{transform:translateX(0) scaleY(1);opacity:1}50%{transform:translateX(5%) scaleY(1.08);opacity:.9}}
@keyframes fogdrift{0%{transform:translateX(-12%)}50%{transform:translateX(12%)}100%{transform:translateX(-12%)}}
@keyframes fall{0%{transform:translate(0,-22px);opacity:0}12%{opacity:.75}88%{opacity:.75}100%{transform:translate(-86px,560px);opacity:0}}
@keyframes snowfall{0%{transform:translate(0,-14px);opacity:0}10%{opacity:.95}25%{transform:translate(8px,128px)}50%{transform:translate(-6px,280px)}75%{transform:translate(8px,420px)}90%{opacity:.95}100%{transform:translate(-3px,560px);opacity:0}}
@keyframes flash{0%,3.5%,9%,100%{opacity:0}1%{opacity:.85}2%{opacity:.18}3%{opacity:.6}}
/* reveal per condition */
.c[data-fx=cloud]    .clouds{opacity:.55}
.c[data-fx=overcast] .clouds{opacity:.92}
.c[data-fx=drizzle]  .clouds{opacity:.64}
.c[data-fx=rain]     .clouds{opacity:.78}
.c[data-fx=thunder]  .clouds{opacity:.9}
.c[data-fx=snow]     .clouds{opacity:.62}
.c[data-fx=cloud]   .sunhaze{opacity:.45}
.c[data-fx=drizzle] .sunhaze{opacity:.22}
.c[data-fx=cloud]    .veil{opacity:.3}
.c[data-fx=overcast] .veil{opacity:.72}
.c[data-fx=drizzle]  .veil{opacity:.46}
.c[data-fx=rain]     .veil{opacity:.62}
.c[data-fx=thunder]  .veil{opacity:.74}
.c[data-fx=fog]      .veil{opacity:.5}
.c[data-fx=snow]     .veil{opacity:.34}
.c[data-fx=fog]      .fog{opacity:.62}
.c[data-fx=rain]     .drop,.c[data-fx=thunder] .drop{display:block}
.c[data-fx=drizzle]  .drop:nth-child(3n+1){display:block;opacity:.6;animation-duration:.85s}
.c[data-fx=thunder]  .drop{animation-duration:.4s}
.c[data-fx=snow]     .flake{display:block}
.c[data-fx=thunder]  .flash{animation:flash 8s linear infinite}
.c[data-fx=thunder]  .bolt{animation:flash 8s linear infinite}

/* header */
.h{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;column-gap:16px;margin-bottom:20px}
.e{justify-self:end;min-width:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:11px;line-height:1.2;letter-spacing:.16em;text-transform:uppercase;color:color-mix(in srgb,var(--accent) 72%,#fff);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wi{justify-self:center;font-size:15px;line-height:1}
.wt{justify-self:start;font-size:13px;font-weight:500;line-height:1;color:var(--text);opacity:.92;white-space:nowrap}

/* prayer panel */
.panel{position:relative;z-index:1}
.arc{display:block;width:100%;height:180px;margin:0;overflow:visible}
.foc{position:absolute;left:0;right:0;top:57.5px;text-align:center}
.foc .cn{position:relative;top:4px;font-family:var(--font-display);font-size:30px;line-height:1.15;font-weight:600;letter-spacing:-.015em;color:var(--text);opacity:.95;margin-bottom:30.6px}
.foc .nt{position:relative;top:4.4px;font-family:var(--font-display);font-size:46px;line-height:1;font-weight:600;letter-spacing:.005em;color:var(--accent)}
.arc .horizon{stroke:#ffffff;stroke-opacity:.16;stroke-width:1;stroke-dasharray:2.5 5}
/* layered arc for legibility over cloud/rain without going thick or cartoonish:
   railsh = a soft dark shadow under the WHOLE arc (separation); rail = the secondary base/future
   arc; warmsh = a faint dark shadow under the ACTIVE stroke (weather-gated); warm = the active
   accent body with its existing glow (unchanged); warmcore = a thin crisp accent core on top. */
.arc .railsh{fill:none;stroke:#070b16;stroke-opacity:.26;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:blur(1.6px)}
.arc .rail{fill:none;stroke:#ffffff;stroke-opacity:.3;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.arc .warmsh{fill:none;stroke:#05070f;stroke-opacity:0;stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round;filter:blur(2px)}
.arc .warm{fill:none;stroke:var(--accent);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px var(--accent))}
.arc .warmcore{fill:none;stroke:color-mix(in srgb,var(--accent) 78%,#fff);stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.arc .dot{fill:#ffffff;fill-opacity:.72}
.arc .dot.next{fill:var(--accent)}
.arc .cur{fill:none;stroke:#fff;stroke-width:2.5;filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.5))}
/* bar mirrors the arc's light system: a dark inset track, then the active fill as a soft accent
   glow (box-shadow, same --accent as the arc) under a crisp gradient on top. No overflow:hidden so
   the glow can breathe and the fill keeps a rounded luminous tip. */
.bar{position:relative;height:6px;border-radius:6px;background:#ffffff12;margin-top:16px;box-shadow:inset 0 1px 2px rgba(0,0,0,.42)}
.bar>i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 5px color-mix(in srgb,var(--accent) 58%,transparent);transition:width .9s linear}
/* busy weather: deepen the dark separation and lift the accent glow a touch — elegant, not neon. */
.c[data-fx=cloud] .arc .railsh,.c[data-fx=overcast] .arc .railsh,.c[data-fx=fog] .arc .railsh,.c[data-fx=drizzle] .arc .railsh,.c[data-fx=rain] .arc .railsh,.c[data-fx=thunder] .arc .railsh,.c[data-fx=snow] .arc .railsh{stroke-opacity:.58}
.c[data-fx=cloud] .arc .warmsh,.c[data-fx=overcast] .arc .warmsh,.c[data-fx=fog] .arc .warmsh,.c[data-fx=drizzle] .arc .warmsh,.c[data-fx=rain] .arc .warmsh,.c[data-fx=thunder] .arc .warmsh,.c[data-fx=snow] .arc .warmsh{stroke-opacity:.5}
.c[data-fx=cloud] .bar,.c[data-fx=overcast] .bar,.c[data-fx=fog] .bar,.c[data-fx=drizzle] .bar,.c[data-fx=rain] .bar,.c[data-fx=thunder] .bar,.c[data-fx=snow] .bar{box-shadow:inset 0 1px 2.5px rgba(0,0,0,.6)}
.c[data-fx=cloud] .bar>i,.c[data-fx=overcast] .bar>i,.c[data-fx=fog] .bar>i,.c[data-fx=drizzle] .bar>i,.c[data-fx=rain] .bar>i,.c[data-fx=thunder] .bar>i,.c[data-fx=snow] .bar>i{box-shadow:0 0 7px color-mix(in srgb,var(--accent) 76%,transparent)}
.left{display:block;text-align:center;margin-top:3.3px;color:var(--text);font-size:17.25px;font-weight:400;line-height:1.2;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
/* countdown line reads in three roles: the time is the value (UI-mono + tabular, the
   brightest part so it's read first); "left until" is quiet connective tissue; the prayer
   name borrows the display face AND the --accent colour so it stays tied to the hero time
   and the prayer-name system. text-shadow is inherited from .left (dark micro-rim, no glow). */
.left .until-time{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:500;letter-spacing:-.01em;opacity:.92}
.left .until-label{opacity:.6;font-family:var(--font-body)}   /* words stay Inter; the spaces around them inherit .left's mono so every gap is one even monospace space */
.left .until-prayer{font-family:var(--font-display);font-weight:600;font-size:20.25px;color:var(--accent)}

/* prayer-times grid */
.times{position:relative;z-index:1;display:grid;grid-template-columns:1fr;gap:6px;margin-top:9.6px}
.p{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:5px 9px;border-radius:11px;background:linear-gradient(160deg,#ffffff26,#ffffff0d);border:1px solid #ffffff2e;-webkit-backdrop-filter:blur(7px) saturate(135%);backdrop-filter:blur(7px) saturate(135%);box-shadow:var(--glass);transition:opacity .3s,background .3s}
.p.on{background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 30%,transparent),color-mix(in srgb,var(--accent) 12%,transparent));border-color:color-mix(in srgb,var(--accent) 50%,transparent)}
.p.now{box-shadow:var(--glass),inset 0 0 0 1.5px color-mix(in srgb,var(--text) 55%,transparent)}
.p.past{opacity:.42}
.p b{font-weight:600;font-size:12.5px;line-height:16.7px;letter-spacing:.01em}
.tm{font-weight:600;font-size:12.5px;line-height:16.7px}

/* dates */
.d{position:relative;z-index:1;direction:ltr;display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-top:8px;padding:0 10px;color:color-mix(in srgb,var(--text) 90%,transparent);font-size:11.5px;line-height:1.2}
.d span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{opacity:.55;font-size:.84em;margin:0 4px;letter-spacing:.05em;unicode-bidi:isolate}
#ah .er{font-size:1.3em;opacity:.66}   /* the Arabic hāʾ (AH marker) reads small — give it a few pt */
.mph{font-size:.92em;unicode-bidi:isolate}   /* moon-phase emoji by the AH date (own class — .moon is the sky moon) */
.mph.pre{opacity:.6}                    /* faint preview of the Hijri day that begins at tonight's Maghrib */

/* readability over busy cloud/rain midtones: a crisp dark micro-rim + soft depth (NO heavy
   outline that would muddy the serif, NO cheap white glow). Dates + glass cells keep a light shadow. */
.d{text-shadow:0 0 1px rgba(4,8,16,.85),0 1px 2px rgba(0,0,0,.55),0 2px 5px rgba(0,0,0,.3)}
.p b,.tm{text-shadow:0 1px 2px rgba(0,0,0,.28)}
.e,.wi,.wt{text-shadow:0 0 1px rgba(4,8,16,.92),0 1px 1px rgba(4,8,16,.6),0 2px 5px rgba(0,0,0,.42)}
.foc .cn,.left{text-shadow:0 0 1px rgba(6,10,18,.88),1px 0 1px rgba(6,10,18,.5),-1px 0 1px rgba(6,10,18,.5),0 1px 1px rgba(6,10,18,.6),0 3px 7px rgba(0,0,0,.4)}
/* the hero time: strongest rim + depth, plus a faint accent-tinted bloom (warm by day, cool by
   night via --accent) for atmosphere — never a white glow. */
.foc .nt{text-shadow:0 0 1px rgba(0,0,0,.95),1px 0 1px rgba(0,0,0,.6),-1px 0 1px rgba(0,0,0,.6),0 1px 1px rgba(0,0,0,.7),0 2px 3px rgba(0,0,0,.55),0 5px 13px rgba(0,0,0,.4),0 0 16px color-mix(in srgb,var(--accent) 15%,transparent)}
/* tabular figures so the per-second countdown, times and dates never jitter */
.foc .nt,.left,.tm,.d,.wt{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
</style>
</head>
<body>
<div class="c">
  <div class="atmo" aria-hidden="true"><div class="scatter"></div><div class="belt"></div><div class="sun"></div></div>
  <svg class="sky" viewBox="0 0 325 530" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <radialGradient id="mg" cx="40%" cy="34%" r="72%">
        <stop offset="0%" stop-color="#27334f"/><stop offset="65%" stop-color="#18223e"/><stop offset="100%" stop-color="#0e1630"/>
      </radialGradient>
      <clipPath id="litclip"><path id="mlitclip"/></clipPath>
    </defs>
    <g class="stars"></g>
    <g class="moon" transform="translate(289 34)">
      <circle class="mcorona" r="48"/>
      <circle class="moccluder" r="48.6"/>            <!-- ALWAYS opaque, sky-coloured: occludes stars at every fade so the moon never goes see-through -->
      <g class="mfeatures">                            <!-- everything that dissolves at dawn/dusk lives here -->
        <circle class="mglow" r="60"/>

<script>
"use strict";
// ---- config from URL hash ------------------------------------------------
const q     = new URLSearchParams(location.hash.slice(1));
const lat   = q.get("lat");
const lon   = q.get("lon");
let tz      = q.get("tz")    || "America/New_York";   // a hint/fallback; the real zone is adopted from the location (see fetchTimings)
const label = q.get("label") || "";
const method= q.get("method")|| "2";
const school= q.get("school")|| "0";
const fmt24 = (q.get("time") || "24") !== "12";
const units = (q.get("units") || "f").toLowerCase() === "c" ? "c" : "f";
// datefmt is now a token format string (YYYY MM DD MMMM …). The old preset keys
// still work for backward compatibility with existing embeds.
const DATEFMT_PRESETS = {iso:"YYYY-MM-DD", us:"MM/DD/YYYY", eu:"DD/MM/YYYY", long:"DD MMMM YYYY"};
const dfRaw = q.get("datefmt") || "iso";
const datefmtStr = DATEFMT_PRESETS[dfRaw.toLowerCase()] || dfRaw;

// ---- simulation overrides (only active when present in the hash) ----------
// Lets you preview any condition without waiting for the real clock/weather:
//   simTime=HH:MM   force the wall clock   simWx=<WMO code>  force weather
//   simMoon=0..1    force illuminated frac simWax=1|0        force waxing/waning
//   simTemp=<n>     force the shown temp     simFeels=<n>     force apparent (feels-like) temp
//   simWind=<m/s>   simWindDir=<deg FROM>    simHumid=<RH %>  simCloud=<cover %>
const SIM = {
  time: q.get("simTime"),
  wx:   q.get("simWx"),
  temp: q.get("simTemp"),
  moon: q.get("simMoon"),
  wax:  q.get("simWax"),
  feels:   q.get("simFeels"),
  wind:    q.get("simWind"),
  windDir: q.get("simWindDir"),
  humid:   q.get("simHumid"),
  cloud:   q.get("simCloud"),
};

const prayers = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
const real    = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

// ---- helpers -------------------------------------------------------------
const $    = s => document.querySelector(s);
const pad  = n => String(n).padStart(2,"0");
const enc  = encodeURIComponent;
const sleep= ms => new Promise(r=>setTimeout(r,ms));
const clamp= x => Math.min(1,Math.max(0,x));
const clean= t => String(t).replace(/\s*\(.+\)\s*/,"").trim();
const mins = t => { const [h,m]=clean(t).split(":").map(Number); return h*60+m; };
const fmt  = t => {
  const [h,m]=clean(t).split(":").map(Number);
  if(fmt24) return `${pad(h)}:${pad(m)}`;
  return `${h%12||12}:${pad(m)} ${h>=12?"PM":"AM"}`;
};
const dur = leftMin => {
  const s=Math.max(0,Math.round(leftMin*60)), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m`;
  return `${sec}s`;
};
// token date formatter: YYYY/YY year · MMMM/MMM/MM/M month · DD/D day
const fmtDate = o => {
  if(!o) return "";
  const yyyy=String(o.year), mn=+(o.month&&o.month.number||0), day=+o.day, mon=(o.month&&o.month.en)||"";
  const t={YYYY:yyyy, YY:yyyy.slice(-2), MMMM:mon, MMM:mon.slice(0,3), MM:pad(mn), M:String(mn), DD:pad(day), D:String(day)};
  return datefmtStr.replace(/YYYY|YY|MMMM|MMM|MM|M|DD|D/g, m=>t[m]);
};

// current wall-clock in the *configured* timezone (not the browser's)
function nowParts(){
  try{
    const f=new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
    const p={}; for(const part of f.formatToParts(new Date())) p[part.type]=part.value;
    let h=(+p.hour)%24, mi=+p.minute, s=+p.second;
    if(SIM.time){ const [H,M]=SIM.time.split(":").map(Number); h=((H%24)+24)%24; mi=M||0; s=0; }
    return {y:+p.year,mo:+p.month,d:+p.day,h,mi,s,dateStr:`${p.day}-${p.month}-${p.year}`};
  }catch(e){
    const d=new Date();
    return {y:d.getFullYear(),mo:d.getMonth()+1,d:d.getDate(),h:d.getHours(),mi:d.getMinutes(),s:d.getSeconds(),dateStr:`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`};
  }
}
function tomorrowStr(){
  const n=nowParts();
  const d=new Date(Date.UTC(n.y,n.mo-1,n.d));
  d.setUTCDate(d.getUTCDate()+1);
  return `${pad(d.getUTCDate())}-${pad(d.getUTCMonth()+1)}-${d.getUTCFullYear()}`;
}

// ---- prayer-times data: fetch + cache + retry ---------------------------
const cacheKey = "salah:"+[lat,lon,tz,method,school].join("|");
function loadCache(dateStr){
  try{ const j=JSON.parse(localStorage.getItem(cacheKey)); if(j&&j.date===dateStr) return j.data; }catch(e){}
  return null;
}
function saveCache(dateStr,data){
  try{ localStorage.setItem(cacheKey,JSON.stringify({date:dateStr,data})); }catch(e){}
}
async function fetchTimings(dateStr){
  // No timezonestring: let Aladhan resolve the zone from lat/lon, so a wrong/stale tz param can't
  // shift the prayer times around the clock. Adopt the resolved zone for "now" so the day-rollover
  // and the countdown match the location, not the viewer's device.
  const u=`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${enc(lat)}&longitude=${enc(lon)}&method=${enc(method)}&school=${enc(school)}`;
  let err;
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
      const j=await r.json();
      if(j&&j.data&&j.data.timings){ if(j.data.meta&&j.data.meta.timezone) tz=j.data.meta.timezone; return j.data; }
      throw new Error("bad api");
    }catch(e){ err=e; if(i<2) await sleep(900*(i+1)); }
  }
  throw err;
}

// normalise the current weather into 0..1 physical drivers (heat/cold/wind/humidity/cloud/haze)
function wxDrivers(){
  const r=(x,a,b)=>clamp((x-a)/(b-a));
  if(!weather) return {heat:0,cold:0,wind:0,gust:0,windX:-0.7,humid:0,rh:0.5,cloud:0,haze:0};
  const toC=v=> v==null?null : (units==="f"?(v-32)*5/9:v);
  const feelsC=toC(weather.feels!=null?weather.feels:weather.temp);
  const dewC=toC(weather.dew);
  return {
    heat: feelsC==null?0:r(feelsC,27,40),                 // 0 below 27°C → 1 at 40°C  (≈80→104°F)
    cold: feelsC==null?0:r(feelsC,8,-8),                  // 0 above 8°C → 1 at −8°C
    wind: r(weather.wind||0,0.5,14),                      // calm → gale (m/s)
    gust: r((weather.gust||0)-(weather.wind||0),2,16),
    windX: -Math.sin((weather.windDir!=null?weather.windDir:225)*Math.PI/180),  // +1 ⇒ wind FROM the west ⇒ clouds drift east
    humid: dewC==null?0:r(dewC,8,22),                     // mugginess via dew point
    rh: (weather.rh!=null?weather.rh:50)/100,
    cloud: (weather.cloud!=null?weather.cloud:0)/100,
    haze: 1-r(weather.vis!=null?weather.vis:20000,1000,20000),
  };
}
function wxInfo(code, day){
  const c=code;
  if(c==null||c===0)   return {cond:"clear",   icon:day?"☀️":"🌙", label:day?"Clear":"Clear night"};
  if(c===1||c===2)     return {cond:"cloud",   icon:day?"⛅":"☁️", label:"Partly cloudy"};
  if(c===3)            return {cond:"cloud",   icon:"☁️",  label:"Overcast"};
  if(c===45||c===48)   return {cond:"fog",     icon:"🌫️", label:"Fog"};
  if(c>=51&&c<=57)     return {cond:"rain",    icon:"🌦️", label:"Drizzle"};
  if(c>=61&&c<=67)     return {cond:"rain",    icon:"🌧️", label:"Rain"};
  if(c>=71&&c<=77)     return {cond:"snow",    icon:"🌨️", label:"Snow"};
  if(c>=80&&c<=82)     return {cond:"rain",    icon:"🌦️", label:"Showers"};
  if(c===85||c===86)   return {cond:"snow",    icon:"🌨️", label:"Snow showers"};
  if(c>=95)            return {cond:"thunder", icon:"⛈️", label:"Thunderstorm"};
  return {cond:"clear", icon:day?"☀️":"🌙", label:"—"};
}

// ---- accurate Moon position & orientation (SunCalc core, BSD-2, github.com/mourner/suncalc) ----
const _RAD=Math.PI/180, _DAYMS=86400000, _J1970=2440588, _J2000=2451545, _OBL=_RAD*23.4397;
const _toDays = d => d.valueOf()/_DAYMS - 0.5 + _J1970 - _J2000;
const _ra  = (l,b)=> Math.atan2(Math.sin(l)*Math.cos(_OBL) - Math.tan(b)*Math.sin(_OBL), Math.cos(l));
const _dec = (l,b)=> Math.asin(Math.sin(b)*Math.cos(_OBL) + Math.cos(b)*Math.sin(_OBL)*Math.sin(l));
const _sid = (d,lw)=> _RAD*(280.16 + 360.9856235*d) - lw;
function _sunCoords(d){ const M=_RAD*(357.5291+0.98560028*d), C=_RAD*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M)), L=M+C+_RAD*102.9372+Math.PI; return {dec:_dec(L,0), ra:_ra(L,0)}; }
function _moonCoords(d){ const L=_RAD*(218.316+13.176396*d), M=_RAD*(134.963+13.064993*d), F=_RAD*(93.272+13.229350*d), l=L+_RAD*6.289*Math.sin(M), b=_RAD*5.128*Math.sin(F), dt=385001-20905*Math.cos(M); return {ra:_ra(l,b), dec:_dec(l,b), dist:dt}; }
// illuminated fraction, waxing flag, and bright-limb position angle χ (Meeus 48.5)
function moonIllum(date){
  const d=_toDays(date), s=_sunCoords(d), m=_moonCoords(d), sd=149598000;
  const phi=Math.acos(Math.sin(s.dec)*Math.sin(m.dec)+Math.cos(s.dec)*Math.cos(m.dec)*Math.cos(s.ra-m.ra));
  const inc=Math.atan2(sd*Math.sin(phi), m.dist-sd*Math.cos(phi));
  const chi=Math.atan2(Math.cos(s.dec)*Math.sin(s.ra-m.ra), Math.sin(s.dec)*Math.cos(m.dec)-Math.cos(s.dec)*Math.sin(m.dec)*Math.cos(s.ra-m.ra));
  return {fraction:(1+Math.cos(inc))/2, waxing:chi<0, chi};
}
// parallactic angle q of the Moon for this place/time (radians)
function moonParallactic(date, latDeg, lonDeg){
  const lw=_RAD*-lonDeg, ph=_RAD*latDeg, d=_toDays(date), c=_moonCoords(d), H=_sid(d,lw)-c.ra;
  return Math.atan2(Math.sin(H), Math.tan(ph)*Math.cos(c.dec)-Math.sin(c.dec)*Math.cos(H));
}

// ---- moon phase (synodic) ------------------------------------------------
function moonPhase(date){
  const synodic=29.530588853;
  const ref=Date.UTC(2000,0,6,18,14,0)/86400000;        // known new moon
  const now=date.getTime()/86400000;
  const phase=(((now-ref)%synodic)+synodic)%synodic/synodic;   // 0 new .. .5 full .. 1 new
  const frac=(1-Math.cos(2*Math.PI*phase))/2;            // illuminated fraction
  return {phase, frac, waxing:phase<0.5};
}
// SVG path for the lit region of a moon of radius R, centred at the origin
function moonLit(R, frac, waxing){
  frac=clamp(frac);
  const rx=R*Math.abs(1-2*frac);                          // terminator half-width
  const limb=waxing?1:0;                                  // bright limb on right(1)/left(0)
  const term=waxing?(frac<0.5?0:1):(frac<0.5?1:0);        // crescent hugs the limb, gibbous bulges away
  return `M0 ${-R} A${R} ${R} 0 0 ${limb} 0 ${R} A${rx.toFixed(2)} ${R} 0 0 ${term} 0 ${-R} Z`;
}
function moonNow(){
  if(SIM.moon!=null){ const frac=clamp(+SIM.moon), waxing=SIM.wax!=="0"; return {frac, waxing, phase: waxing?frac/2:1-frac/2}; }
  return moonPhase(new Date());
}
function phaseEmoji(p){ return ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"][Math.round(((p||0)%1)*8)%8]; }  // synodic phase (0..1) → 8-step moon emoji
function renderMoon(){
  const R=48; let frac, waxing, rotDeg=0;
  if(SIM.moon!=null){                                              // sim: simple upright phase for testing
    frac=clamp(+SIM.moon); waxing=SIM.wax!=="0";
    $("#mlitclip").setAttribute("d", moonLit(R, frac, waxing));
  } else if(isFinite(+lat) && isFinite(+lon)){                     // real: accurate fraction + observed orientation
    const date=new Date(), latC=Math.max(-89.5,Math.min(89.5,+lat)), il=moonIllum(date), q=moonParallactic(date, latC, +lon);
    frac=il.fraction; waxing=il.waxing;
    $("#mlitclip").setAttribute("d", moonLit(R, frac, true));      // canonical (lit-right, cusps vertical)…
    rotDeg=-(((il.chi - q)*180/Math.PI)+90);                       // …rotate the whole disc to the bright-limb zenith angle χ−q (encodes hemisphere mirror + cusp tilt)
  } else {                                                         // no coords yet: a plausible upright moon, never NaN
    const mp=moonNow(); frac=mp.frac; waxing=mp.waxing;
    $("#mlitclip").setAttribute("d", moonLit(R, frac, waxing));
  }
  const feat=$(".mfeatures"); if(feat) feat.setAttribute("transform", `rotate(${rotDeg.toFixed(1)})`);
  // earthshine glows on the dark limb (strongest near new); the halo grows with illumination.
  const ms=$(".mshine"); if(ms) ms.style.opacity=(0.10+0.20*(1-frac)).toFixed(3);
  const gl=$(".mglow");  if(gl){ gl.setAttribute("r",(52+26*frac).toFixed(1)); gl.style.opacity=(0.04+0.26*frac).toFixed(3); }
}

// physically-weighted star field: a power-law magnitude cascade (a few bright, many faint), per-star
// colour from the B-V sequence (mostly blue-white→white with a warm minority), bright-star glow halos,
// and altitude-dependent twinkle (stars low in the window scintillate harder + faster). Deterministic.
function buildStars(){
  const g=document.querySelector(".stars"); if(!g) return;
  const W=325, H=300, N=130;
  const rnd=(i,k)=>{ const v=Math.sin((i+1)*k)*43758.5453; return v-Math.floor(v); };
  const COL=["#9bb2ff","#aabfff","#cad7ff","#f4f3ff","#fff4e8","#ffd9a8","#ffc070"];   // O/B → M (B-V → sRGB)
  const CW =[ .06,      .12,      .24,      .22,      .18,      .12,      .06 ];          // naked-eye population weights
  const cdf=[]; let acc=0; for(const w of CW){ acc+=w; cdf.push(acc); }
  let s="";
  for(let i=0;i<N;i++){
    const x=rnd(i,12.9898)*W, y=Math.pow(rnd(i,78.233),1.4)*H;          // bias star density toward the top of the window
    const mag=0.2+5.4*Math.pow(rnd(i,3.71),0.34);                       // steep faint-end power law: most stars are dim
    const r=Math.max(0.4, 1.85-0.25*mag), o=Math.min(1, Math.max(0.24, 1.08-0.15*mag));
    const cu=rnd(i,9.13); let ci=cdf.findIndex(c=>cu<=c); if(ci<0)ci=3;
    const col=COL[ci];
    const alt=1-y/H;                                                    // 1 = top, 0 = horizon
    const amp=(0.18+0.34*(1-alt)).toFixed(2);                           // clearly-visible scintillation (low stars twinkle hardest)…
    const dur=(1.6+4.2*alt).toFixed(1);                                 // …and faster
    const twinkles=rnd(i,5.27)>0.35;                                    // ~65 % twinkle
    if(mag<2.4) s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(r*2.7).toFixed(1)}" fill="${col}" opacity="0.2"/>`;  // soft glow halo on the brighter stars
    s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(2)}" fill="${col}" opacity="${o.toFixed(2)}"`
      +(twinkles?` style="--o:${o.toFixed(2)};--amp:${amp};animation:tw ${dur}s ease-in-out ${(-rnd(i,2.1)*6).toFixed(1)}s infinite"`:"")+"/>";
  }
  g.innerHTML=s;
}

// ---- state ---------------------------------------------------------------
let today=null, tomorrow=null, lastDate=null, fetchingTomorrow=false, lastMoonMin=-1;
$("#loc").textContent = label;
$("#loc").style.display = label ? "" : "none";

function showError(msg){ $(".nt").textContent="—"; $(".left").textContent=msg; }
function isDayNow(nowMin){
  if(!today) return true;
  const sr=mins(today.timings.Sunrise), ss=mins(today.timings.Sunset||today.timings.Maghrib);
  return nowMin>=sr && nowMin<ss;
}

// build everything render() needs, in tz minutes
function model(){
  const n=nowParts(), nowMin=n.h*60+n.mi+n.s/60, t=today.timings;
  const noon=mins(t.Dhuhr), start=noon-720;
  const norm=x=>{ while(x<start)x+=1440; while(x>=start+1440)x-=1440; return x; };
  // sort the six waypoints by time-of-day so "next"/"current" stay correct even if the timings
  // aren't in the usual Fajr→Isha order (e.g. a mis-set time zone shifts them around the clock).
  const list=prayers.map(k=>({k,m:mins(t[k]),t:t[k]})).sort((a,b)=>a.m-b.m);
  const i=list.findIndex(x=>x.m>nowMin);
  let next, nextMin, prevMin, tomorrowFlag;
  if(i>=0){ next=list[i]; nextMin=next.m; prevMin=i>0?list[i-1].m:list[list.length-1].m-1440; tomorrowFlag=false; }
  else { const ft=tomorrow?tomorrow.timings.Fajr:t.Fajr; next={k:"Fajr",t:ft,m:mins(ft)}; nextMin=mins(ft)+1440; prevMin=list[list.length-1].m; tomorrowFlag=true; }
  const passed=list.filter(x=>x.m<=nowMin); let cur=passed.length?passed[passed.length-1].k:"Isha";
  // "Sunrise" only lingers 20 min; the rest of the morning (until Dhuhr) is "Forenoon"
  if(cur==="Sunrise" && nowMin >= mins(t.Sunrise)+20) cur="Forenoon";
  const doy=Math.floor((Date.UTC(n.y,n.mo-1,n.d)-Date.UTC(n.y,0,0))/86400000);
  const decl=23.44*Math.PI/180*Math.sin(2*Math.PI*(doy-80)/365.25);   // solar declination (rad), from the date
  return {
    t, noon, decl, sunrise:norm(mins(t.Sunrise)), sunset:norm(mins(t.Sunset||t.Maghrib)),
    nowMin, nowAbs:norm(nowMin), warmEnd: tomorrowFlag ? start+1440 : norm(next.m),
    dots: prayers.map(k=>({k, abs:norm(mins(t[k]))})),
    currentKey:cur, nextKey:next.k, nextTime:next.t,
    leftMin:nextMin-nowMin, progress:clamp((nowMin-prevMin)/(nextMin-prevMin)),
    needTomorrow:tomorrowFlag
  };
}

// draw the solar-prayer arc
function drawArc(M){
  const W=295,H=180,hY=104,Ad=104,An=76,R=5, PAD=1.3, start=M.noon-720;
  // inset the curve by the rail's stroke half-width so its VISIBLE edge (stroke + round cap) lines
  // up with the progress-bar's edge, instead of overhanging it by ~1.2px.
  const X=a=>PAD+(a-start)/1440*(W-2*PAD);
  // POLAR days (midnight sun / polar night) have no real sunrise→sunset — Aladhan returns a degenerate
  // Sunrise≈Sunset, which would make the warp below collapse the curve to a flat line. Detect it and
  // fall back to the plain solar-altitude curve about the transit, so the sun's shallow path still shows.
  const dayLen=M.sunset-M.sunrise, polar=dayLen<30||dayLen>1410;
  const noonT=polar?M.noon:(M.sunrise+M.sunset)/2;             // solar transit (Dhuhr when degenerate)
  const apexT=polar?noonT:noonT-18;                            // normal days peak ~18 min before Dhuhr (zawāl, the
  // makrūh zenith) so Dhuhr/the ring sit just past the apex; polar days keep the true transit.
  // FIXED FRAME, physics-INFORMED curve. The arc's box never moves: the apex always reaches the top
  // (1 M below the header) and the deepest night always reaches the bottom (1 M above the bar). We
  // sample the real sun altitude, tanh-shape it for a smooth rounded line, then NORMALISE so the
  // curve fills that fixed frame regardless of date/latitude.
  const DEG=Math.PI/180, phi=(+(q.get("lat"))||0)*DEG;
  let decl=M.decl;                                             // declination from the date (rad)…
  const HsrDeg=((M.sunset-M.sunrise)/2)*0.25, tp=Math.tan(phi); // sunrise hour angle (deg, half-day)
  if(!polar && Math.abs(tp)>0.05){ const d=Math.atan(-Math.cos(HsrDeg*DEG)/tp); // …refined by the day's own length
    if(isFinite(d)&&Math.abs(d)<24*DEG) decl=d; }             // so altitude hits exactly 0 at sunrise/sunset
  // warp the hour angle so the peak (H=0) lands at apexT while H=±Hsr still lands on sunrise/sunset —
  // Sunrise/Maghrib stay on the horizon, the apex shifts just before Dhuhr. On a polar day there is no
  // crossing, so use the plain hour angle from the transit.
  const Hof = polar ? (a=>(a-noonT)*0.25) : (a=> a<=apexT ? -HsrDeg*(apexT-a)/(apexT-M.sunrise) : HsrDeg*(a-apexT)/(M.sunset-apexT));
  const cl=x=>x<-1?-1:x>1?1:x;
  const elevDeg=a=>Math.asin(cl(Math.sin(phi)*Math.sin(decl)+Math.cos(phi)*Math.cos(decl)*Math.cos(Hof(a)*DEG)))/DEG;
  // normalise each side by the day's own extreme so the apex lands on Ad and the deepest night on
  // An every time (clamped so a very low sun still fills the frame instead of collapsing flat).
  const S=42, Sn=S*An/Ad;
  const maxE=Math.max(3, elevDeg(apexT)), maxD=Math.max(3, -elevDeg(start), -elevDeg(start+1440));
  const dayK=Math.tanh(maxE/S), nightK=Math.tanh(maxD/Sn);
  const ALT=a=>{ const d=elevDeg(a); return d>=0 ? Ad*Math.tanh(d/S)/dayK : An*Math.tanh(d/Sn)/nightK; };
  const Y=a=>hY-ALT(a);
  const pathFrom=(a0,a1,steps)=>{
    let d=""; for(let i=0;i<=steps;i++){ const a=a0+(a1-a0)*i/steps; d+=`${i?"L":"M"}${X(a).toFixed(1)} ${Y(a).toFixed(1)}`; } return d;
  };
  const rail=pathFrom(start,start+1440,180);                  // ~8 min per sample → a smooth path
  // elapsed portion of the day, filled in accent up to "now" (like the progress bar)
  const elapsed=pathFrom(start,M.nowAbs,Math.max(2,Math.round((M.nowAbs-start)/8)));
  let dots="";
  for(const p of M.dots){
    const cls = p.k===M.nextKey ? "dot next" : "dot";
    const a = p.abs;                                              // every dot at its real time so the moving ring lands exactly on the dot when that prayer is current
    dots+=`<circle class="${cls}" cx="${X(a).toFixed(1)}" cy="${Y(a).toFixed(1)}" r="${R}"/>`;
  }
  // "eye of a needle": split the marker ring at the two points where the curve crosses it. The grey
  // future rail threads THROUGH the ring (one half behind, one half in front); the active/coloured
  // arc is then drawn over the whole ring, so the live light reads as sitting ON TOP of the marker.
  const cx=X(M.nowAbs), cy=Y(M.nowAbs), r=8;
  const dx=X(M.nowAbs+10)-X(M.nowAbs-10), dy=Y(M.nowAbs+10)-Y(M.nowAbs-10);
  const th=Math.atan2(dy,dx), ux=Math.cos(th)*r, uy=Math.sin(th)*r;
  const p1=`${(cx+ux).toFixed(1)} ${(cy+uy).toFixed(1)}`, p2=`${(cx-ux).toFixed(1)} ${(cy-uy).toFixed(1)}`;
  const eyeBack =`<path class="cur" d="M${p1} A${r} ${r} 0 0 0 ${p2}"/>`;
  const eyeFront=`<path class="cur" d="M${p1} A${r} ${r} 0 0 1 ${p2}"/>`;
  return `<line class="horizon" x1="${PAD}" y1="${hY}" x2="${W-PAD}" y2="${hY}"/>`+
         `<path class="railsh" d="${rail}"/>`+eyeBack+
         `<path class="rail" d="${rail}"/>`+eyeFront+
         `<path class="warmsh" d="${elapsed}"/><path class="warm" d="${elapsed}"/><path class="warmcore" d="${elapsed}"/>`+
         `${dots}`;
}

// ---- continuous time-of-day sky -----------------------------------------
const lerp =(a,b,t)=>a+(b-a)*t;
const mixA =(A,B,t)=>A.map((v,i)=>lerp(v, B[i]!=null?B[i]:v, t));
const mixRGB=(A,T,s)=>[lerp(A[0],T[0],s),lerp(A[1],T[1],s),lerp(A[2],T[2],s)];
const rgb  =a=>`rgb(${Math.round(a[0])},${Math.round(a[1])},${Math.round(a[2])})`;
const rgba =a=>`rgba(${Math.round(a[0])},${Math.round(a[1])},${Math.round(a[2])},${(+a[3]).toFixed(3)})`;

// keyframe palettes: g1 top sky · g2 mid · g3 horizon/base · glow (sun bloom rgba)
// · hor (warm horizon bloom rgba) · stars opacity. Luminance is bounded so the
// light text stays legible even at "noon" (deep azure, never pastel).
const KF={
  deepNight:{g1:[11,20,48],  g2:[7,10,28],   g3:[13,16,38],   glow:[70,90,180,0],     hor:[40,40,92,0],      stars:1,   accent:[206,218,242],accent2:[150,168,212],text:[238,241,255]},
  astro:    {g1:[15,23,56],  g2:[10,16,38],  g3:[24,21,54],   glow:[92,102,192,.07],  hor:[120,92,150,.10],  stars:.92, accent:[210,218,238],accent2:[156,170,210],text:[234,238,252]},
  dawn:     {g1:[30,37,84],  g2:[60,48,96],  g3:[156,84,100], glow:[235,150,120,.20], hor:[233,120,112,.34], stars:.45, accent:[255,213,170],accent2:[236,170,116],text:[246,235,241]},
  sunrise:  {g1:[44,76,124], g2:[82,98,138], g3:[205,120,64], glow:[255,184,98,.30],  hor:[255,160,82,.36],  stars:.10, accent:[255,221,150],accent2:[244,184,92], text:[253,239,224]},
  morning:  {g1:[32,92,146], g2:[42,110,152],g3:[84,130,162], glow:[255,230,162,.20], hor:[255,226,168,.12], stars:0,   accent:[255,228,158],accent2:[242,192,104],text:[243,247,255]},
  noon:     {g1:[27,96,150], g2:[24,108,143],g3:[46,120,143], glow:[255,244,198,.18], hor:[192,224,236,.05], stars:0,   accent:[255,231,170],accent2:[245,200,112],text:[241,247,255]},
  afternoon:{g1:[29,88,136], g2:[46,101,141],g3:[122,120,130],glow:[255,226,152,.18], hor:[255,212,152,.10], stars:0,   accent:[255,224,150],accent2:[243,186,96], text:[245,244,238]},
  golden:   {g1:[37,76,122], g2:[114,88,114],g3:[210,140,74], glow:[255,178,88,.30],  hor:[255,152,74,.32],  stars:0,   accent:[255,205,132],accent2:[244,160,82], text:[255,240,222]},
  sunset:   {g1:[33,39,82],  g2:[98,54,92],  g3:[200,82,64],  glow:[255,118,76,.30],  hor:[242,94,72,.38],   stars:.22, accent:[255,206,158],accent2:[243,158,104],text:[253,237,222]},
  dusk:     {g1:[19,28,64],  g2:[31,30,68],  g3:[66,42,76],   glow:[118,104,184,.11],  hor:[120,96,150,.16],  stars:.75, accent:[222,214,236],accent2:[168,166,210],text:[240,233,245]},
};
function paletteAt(M){
  const start=M.noon-720;
  const nm=raw=>{ let x=mins(raw); while(x<start)x+=1440; while(x>=start+1440)x-=1440; return x; };
  const fajr=nm(M.t.Fajr), sr=nm(M.t.Sunrise), dh=nm(M.t.Dhuhr), asr=nm(M.t.Asr),
        mg=nm(M.t.Sunset||M.t.Maghrib), ish=nm(M.t.Isha);
  const stops=[
    [start,        KF.deepNight], [fajr-72, KF.astro], [fajr, KF.dawn], [sr, KF.sunrise],
    [(sr+dh)/2,    KF.morning],   [dh, KF.noon],       [asr, KF.afternoon], [(asr+mg)/2, KF.golden],
    [mg,           KF.sunset],    [mg+30, KF.dusk],    [mg+75, KF.astro],   [start+1440, KF.deepNight],
  ];
  for(let i=1;i<stops.length;i++) if(stops[i][0]<=stops[i-1][0]) stops[i][0]=stops[i-1][0]+1;
  const a=M.nowAbs;
  let i=0; while(i<stops.length-2 && a>stops[i+1][0]) i++;
  const [t0,p0]=stops[i], [t1,p1]=stops[i+1];
  const f=clamp(t1>t0?(a-t0)/(t1-t0):0);
  return {
    g1:mixRGB(p0.g1,p1.g1,f), g2:mixRGB(p0.g2,p1.g2,f), g3:mixRGB(p0.g3,p1.g3,f),
    glow:mixA(p0.glow,p1.glow,f), hor:mixA(p0.hor,p1.hor,f), stars:lerp(p0.stars,p1.stars,f),
    accent:mixRGB(p0.accent,p1.accent,f), accent2:mixRGB(p0.accent2,p1.accent2,f), text:mixRGB(p0.text,p1.text,f),
  };
}
function sunMetrics(M){
  const start=M.noon-720, a=M.nowAbs; let alt;
  if(a<=M.sunrise){ const f=(a-start)/((M.sunrise-start)||1); alt=-28*Math.cos(f*Math.PI/2); }
  else if(a<=M.sunset){ const f=(a-M.sunrise)/((M.sunset-M.sunrise)||1); alt=46*Math.sin(f*Math.PI); }
  else { const f=(a-M.sunset)/(((start+1440)-M.sunset)||1); alt=-28*Math.sin(f*Math.PI/2); }
  const altN=alt/46;                                   // +1 at zenith (Dhuhr), <0 below horizon
  return { x:6+(a-start)/1440*88, y:60-Math.max(0,altN)*44, altN };
}

// moon opacity: fully out by midday, fully present by night — fades Fajr→(Sunrise+h)
// and back in (Maghrib−h)→Isha, where h is half the Fajr→Sunrise gap.
function moonVis(M){
  const start=M.noon-720;
  const nm=raw=>{ let x=mins(raw); while(x<start)x+=1440; while(x>=start+1440)x-=1440; return x; };
  const fajr=nm(M.t.Fajr), sr=nm(M.t.Sunrise), mg=nm(M.t.Sunset||M.t.Maghrib), ish=nm(M.t.Isha);
  const h=(sr-fajr)/2, a=M.nowAbs, t1=fajr, t2=sr+h, t3=mg-h, t4=ish;
  if(a<=t1) return 1;
  if(a<t2)  return 1-(a-t1)/((t2-t1)||1);   // dawn: moon dissolves as the sky brightens
  if(a<t3)  return 0;                        // daytime: gone
  if(a<t4)  return (a-t3)/((t4-t3)||1);      // dusk: moon emerges before Isha
  return 1;
}

// ---- weather → sky modifier + effect class ------------------------------
function wxClass(code){
  const c=code;
  if(c==null||c===0) return "clear";
  if(c===1||c===2)   return "cloud";
  if(c===3)          return "overcast";
  if(c===45||c===48) return "fog";
  if(c>=51&&c<=57)   return "drizzle";
  if((c>=61&&c<=67)||(c>=80&&c<=82)) return "rain";
  if((c>=71&&c<=77)||c===85||c===86) return "snow";
  if(c>=95)          return "thunder";
  return "clear";
}
// tint = sky colour pulled toward this (ts strength); gs/hs scale glow/horizon
// bloom; st/mn scale stars/moon; blur adds atmospheric softening. at/as = the
// colour the weather's light casts (steel rain, icy snow, grey fog, violet
// storm) and how strongly it overrides the sun/moon accent — kept light to stay legible.
const WX={
  clear:   {tint:null,          ts:0,   gs:1,   hs:1,  st:1,   mn:1,   blur:0,   at:null,          as:0},
  cloud:   {tint:[62,74,90],    ts:.20, gs:.80, hs:.7, st:.5,  mn:.82, blur:.3,  at:[190,206,226], as:.34},
  overcast:{tint:[60,68,80],    ts:.50, gs:.18, hs:.16,st:.12, mn:.42, blur:.5,  at:[142,172,206], as:.70},
  fog:     {tint:[122,128,130], ts:.44, gs:.10, hs:.05,st:0,   mn:.30, blur:1.6, at:[156,172,190], as:.72},
  drizzle: {tint:[56,74,92],    ts:.34, gs:.50, hs:.5, st:.22, mn:.58, blur:.5,  at:[140,186,224], as:.70},
  rain:    {tint:[42,62,84],    ts:.46, gs:.22, hs:.20,st:.10, mn:.50, blur:.7,  at:[108,166,218], as:.84},
  snow:    {tint:[96,110,126],  ts:.34, gs:.60, hs:.5, st:.50, mn:.70, blur:.5,  at:[122,188,226], as:.82},
  thunder: {tint:[46,36,74],    ts:.50, gs:.18, hs:.16,st:.16, mn:.46, blur:.6,  at:[172,154,236], as:.70},
};

function applyTheme(M){
  const day=isDayNow(M.nowMin);
  const code=weather?weather.code:null;
  const info=wxInfo(code,day), cls=wxClass(code), w=WX[cls];
  const P=paletteAt(M);
  const sm=sunMetrics(M);
  const mp=moonNow();
  const moonStrength=clamp(moonVis(M))*clamp(mp.frac);          // 0 new/absent .. 1 full + present
  const D=wxDrivers();                                          // 0..1 physical weather drivers (heat/cold/wind/humidity…)
  const directional=1-D.cloud*D.cloud;                          // weather-directed light: hard sun when clear, flat/shadowless as it goes overcast
  let g1=P.g1, g2=P.g2, g3=P.g3;
  if(w.tint){ g1=mixRGB(g1,w.tint,w.ts); g2=mixRGB(g2,w.tint,w.ts); g3=mixRGB(g3,w.tint,w.ts); }
  // sun bloom + horizon scatter. In murky weather the leaked warm light desaturates toward the
  // grey deck; at true night the horizon cools toward moonlit blue (scaled by the moon's phase);
  // and the band fades out as the sun sinks past twilight — so warm glow never lingers into night.
  let gr=[P.glow[0],P.glow[1],P.glow[2]], hr=[P.hor[0],P.hor[1],P.hor[2]];
  if(w.tint){ const k=Math.min(1,1.4*w.ts); gr=mixRGB(gr,w.tint,k); hr=mixRGB(hr,w.tint,k); }
  const nightness=clamp(-sm.altN/0.25);                         // 0 at sunset → 1 once the sun is ~11.5° down
  const tHor=(0.30+0.55*moonStrength)*nightness;
  hr=[lerp(hr[0],96,tHor), lerp(hr[1],116,tHor), lerp(hr[2],196,tHor)];
  const scatterFac=clamp((sm.altN+0.30)/0.30);                  // 1 above horizon → 0 once the sun is well below it
  const glow=[gr[0],gr[1],gr[2],P.glow[3]*w.gs*(0.25+0.75*directional)];   // the Mie bloom fades out as cloud builds → no crisp sun-disc under overcast
  const hor =[hr[0],hr[1],hr[2],P.hor[3]*w.hs*scatterFac*(0.4+0.6*directional)];
  const stars=(day?0:P.stars)*w.st*(1-0.35*moonStrength);       // a bright moon washes out faint stars
  const moon =clamp(moonVis(M))*w.mn;
  // accent = the dominant light's colour: a clear night reads the moon (brightness scales with phase,
  // not hue); daytime reads the warm sun; weather tints it. accent2 = the hand-authored deeper tone.
  let baseAccent=P.accent;
  if(cls==="clear" && !day){
    const L=clamp(moonVis(M))*(0.12+0.88*mp.frac);
    baseAccent=mixRGB([188,198,220],[216,224,244],L);           // dim airglow silver → bright full-moon silver
  }
  const ac = w.at ? mixRGB(baseAccent, w.at, w.as) : baseAccent.slice();
  const ac2 = w.at ? mixRGB(P.accent2, w.at, w.as) : P.accent2.slice();
  const c=$(".c");
  c.style.setProperty("--accent",rgb(ac));
  c.style.setProperty("--accent2",rgb(ac2));
  c.style.setProperty("--text",rgb(P.text));
  c.style.setProperty("--g1",rgb(g1));
  c.style.setProperty("--g2",rgb(g2));
  c.style.setProperty("--g3",rgb(g3));
  c.style.setProperty("--glow",rgba(glow));
  c.style.setProperty("--horizon",rgba(hor));
  c.style.setProperty("--sunx",sm.x.toFixed(1)+"%");
  c.style.setProperty("--suny",sm.y.toFixed(1)+"%");
  c.style.setProperty("--stars",stars.toFixed(3));
  c.style.setProperty("--moonocc",clamp(Math.max(stars, moon)*10).toFixed(3));   // occluder opaque whenever the disc OR stars are visible; 0 in full daylight (no ghost moon)
  c.style.setProperty("--starblur",Math.min(0.6, w.blur + 0.6*D.humid).toFixed(2)+"px");   // humid air softens the stars a touch (capped so points stay crisp)
  c.style.setProperty("--moonfeat",moon.toFixed(3));
  c.style.setProperty("--moon-sky",rgb(g1));         // occluder tracks the live sky colour so the faded moon melts into it, never revealing stars
  // heat/cold cues from apparent_temperature; frost vignette + cool/warm soft-light tints (background only)
  c.style.setProperty("--heat",D.heat.toFixed(3));
  c.style.setProperty("--warm",(0.20*D.heat).toFixed(3));
  c.style.setProperty("--cool",(0.22*D.cold).toFixed(3));
  c.style.setProperty("--frost",(0.5*D.cold).toFixed(3));
  c.style.setProperty("--breathe-dur",(9-5*D.heat).toFixed(1)+"s");   // the Mie bloom pulses faster on hot days (radiant shimmer)
  // lunar corona: a thin-cloud + humid sky haloes a present moon
  const corona=clamp((D.rh-0.78)/0.18)*((D.cloud>0.15&&D.cloud<0.75)?1:0.3)*clamp(mp.frac+0.2)*clamp(moonVis(M));
  const mc=$(".mcorona"); if(mc){ mc.setAttribute("stroke-width",(6+10*corona).toFixed(1)); mc.style.opacity=(0.5*corona).toFixed(3); }
  // wind → cloud drift speed + gust flicker
  c.style.setProperty("--cloud-dur-a",(70-55*D.wind).toFixed(0)+"s");
  c.style.setProperty("--cloud-dur-b",(100-80*D.wind).toFixed(0)+"s");
  c.style.setProperty("--gust",D.gust.toFixed(3));
  c.style.setProperty("--wind-dir", D.windX>=0?"1":"-1");        // wind FROM the west ⇒ clouds drift east(+); flips with the bearing
  // Belt of Venus: a pink anti-twilight band low on the ANTI-solar horizon during civil twilight (sun 0..−6°)
  const depN=-sm.altN, belt=Math.max(0,1-Math.abs(depN-0.045)/0.085)*((cls==="clear"||cls==="cloud")?1:0.25);
  c.style.setProperty("--antix",(100-sm.x).toFixed(1)+"%");
  c.style.setProperty("--belt",`rgba(232,150,168,${(0.34*belt).toFixed(3)})`);
  c.dataset.fx=cls;
  const wi=$("#wi"); wi.textContent=info.icon; wi.title=info.label;
  $("#wt").textContent=weather?`${weather.temp}°`:"";
}

// Size the present-prayer name to the live arc: keep 1 M of clearance from the curve on each side
// (the arc is narrower on short days, wider on long ones — so we fit per day, not a fixed size) and
// sit the text baseline 1/2 M above the horizon, WITHOUT moving the hero time (it stays centred
// between horizon and bar). Gated on name/day so it only recomputes when the curve actually changes.
let _cnFit="";
function fitCn(M){
  const cn=$(".cn"), nt=$(".nt"), rail=document.querySelector(".arc .rail"),
        hz=document.querySelector(".arc .horizon"), bar=$(".bar");
  if(!cn||!nt||!rail||!hz||!bar) return;
  const key=M.currentKey+"|"+Math.round(M.sunrise)+"|"+Math.round(M.sunset);
  if(key===_cnFit) return;
  const Mu=16, gap=Mu/2;
  const box=el=>{ const r=document.createRange(); r.selectNodeContents(el); return r.getBoundingClientRect(); };
  cn.style.fontSize="30px";
  const g0=box(cn), w30=g0.width, cx=(g0.left+g0.right)/2;
  const ctx=fitCn._x||(fitCn._x=document.createElement("canvas").getContext("2d"));
  ctx.font=`600 30px ${getComputedStyle(cn).fontFamily}`;
  const cm=ctx.measureText(cn.textContent);
  const ascR=(cm.actualBoundingBoxAscent||21)/30, descR=(cm.fontBoundingBoxDescent||7.2)/30;  // ink-cap top / font descent, per font px
  const horizonY=hz.getBoundingClientRect().top;
  const svg=rail.ownerSVGElement, L=rail.getTotalLength(), pts=[];
  for(let i=0;i<=200;i++){ const p=rail.getPointAtLength(L*i/200); const s=svg.createSVGPoint(); s.x=p.x; s.y=p.y; pts.push(s.matrixTransform(rail.getScreenCTM())); }
  const halfAt=ty=>{ let l=-1e9,r=1e9; for(let i=1;i<pts.length;i++){ const a=pts[i-1],b=pts[i]; if((a.y-ty)*(b.y-ty)<=0&&a.y!==b.y){ const t=(ty-a.y)/(b.y-a.y), x=a.x+(b.x-a.x)*t; if(x<cx) l=Math.max(l,x); else r=Math.min(r,x); } } return Math.min(cx-l, r-cx); };
  let font=30;                                                  // letters' cap-top y depends on font, arc width on that y → damped fixed-point
  for(let i=0;i<12;i++){
    const half=halfAt((horizonY-gap)-ascR*font);
    if(!isFinite(half)||half<=0) break;
    const fit=(2*half-2*Mu)/w30*30, nf=Math.max(13,Math.min(30,fit)), nx=(font+nf)/2;
    if(Math.abs(nx-font)<0.1){ font=nx; break; } font=nx;
  }
  cn.style.fontSize=font.toFixed(1)+"px";
  const gb=box(cn), curTop=parseFloat(getComputedStyle(cn).top)||0;
  cn.style.top=(curTop+((horizonY-gap+descR*font)-gb.bottom)).toFixed(2)+"px";    // baseline 1/2 M above horizon
  const barTop=bar.getBoundingClientRect().top, tgt=(horizonY+barTop)/2;            // re-centre the hero time
  const mid=()=>{ const b=box(nt); return (b.top+b.bottom)/2; };
  const curM=parseFloat(getComputedStyle(cn).marginBottom)||0;
  cn.style.marginBottom=(curM+(tgt-mid())).toFixed(2)+"px";
  // only cache once the real display font is measurable — otherwise re-fit next frame so a size
  // computed against the fallback font (before Fraunces loads) doesn't get locked in.
  try{ if(!document.fonts || document.fonts.check('600 24px "Fraunces"')) _cnFit=key; }catch(e){ _cnFit=key; }
}

function render(){
  if(!today) return;
  const M=model();
  const mm=Math.floor(M.nowMin); if(mm!==lastMoonMin){ lastMoonMin=mm; renderMoon(); }   // re-render the moon each minute so its orientation/earthshine track the evening
  const afterMaghrib = M.nowMin >= mins(M.t.Maghrib);          // the Islamic (Hijri) day rolls over at Maghrib, not midnight
  if(!tomorrow && !fetchingTomorrow){                          // always: needed for the overnight Fajr, the AH roll-over, and the pre-Maghrib preview number
    fetchingTomorrow=true;
    fetchTimings(tomorrowStr()).then(d=>{tomorrow=d;fetchingTomorrow=false;}).catch(()=>{fetchingTomorrow=false;});
  }
  $(".cn").textContent = M.currentKey;
  $(".nt").textContent = fmt(M.nextTime);
  $(".left").innerHTML = `<span class="until-time">${dur(M.leftMin)}</span> <span class="until-label">left</span> <span class="until-label">until</span> <span class="until-prayer">${M.nextKey}</span>`;
  $(".bar>i").style.width = (M.progress*100).toFixed(1)+"%";
  $(".arc").innerHTML = drawArc(M);
  fitCn(M);
  $(".times").innerHTML = prayers.map(k=>{
    const on   = k===M.nextKey;                      // next → coloured (incl. tomorrow's Fajr overnight)
    const now  = k===M.currentKey;                   // present → bordered (not coloured)
    const dim  = !now && !on;                        // anything that isn't present or next → dimmed
    return `<div class="p ${on?"on":""} ${now?"now":""} ${dim?"past":""}"><b>${k}</b><span class="tm">${fmt(M.t[k])}</span></div>`;
  }).join("");
  const g=today.date&&today.date.gregorian, h=today.date&&today.date.hijri;
  $("#ce").innerHTML = g ? `${fmtDate(g)}<span class="er">CE</span>` : "";
  // AH advances at Maghrib (not midnight). BEFORE Maghrib show today's Hijri plus a faint preview of
  // the day that begins tonight — "| <moon-phase emoji> <that day's number>" at ~20% opacity. AFTER
  // Maghrib the date itself becomes that next day and the preview/emoji is dropped entirely.
  const tmrwH = tomorrow && tomorrow.date && tomorrow.date.hijri;
  const ahH = (afterMaghrib && tmrwH) ? tomorrow.date.hijri : h;
  const tail = (!afterMaghrib && tmrwH) ? ` <span class="mph pre">| ${phaseEmoji(moonNow().phase)} ${tomorrow.date.hijri.day}</span>` : "";
  $("#ah").innerHTML = ahH ? `<span class="er">ه</span>${fmtDate(ahH)}${tail}` : "";
  applyTheme(M);
}

function tick(){
  const n=nowParts();
  if(lastDate && n.dateStr!==lastDate){           // crossed midnight → load the new day
    tomorrow=null; renderMoon();
    fetchTimings(n.dateStr).then(d=>{today=d;saveCache(n.dateStr,d);}).catch(()=>{});
  }
  lastDate=n.dateStr;
  fetchWeather();
  render();
}

async function boot(){
  buildStars();
  buildWeather();
  renderMoon();
  if(!lat||!lon){ showError("Add lat & lon to the URL"); return; }
  loadWx();
  if(SIM.wx!=null) weather={code:+SIM.wx, temp: SIM.temp!=null?+SIM.temp:72,
    feels: SIM.feels!=null?+SIM.feels:(SIM.temp!=null?+SIM.temp:72),
    rh: SIM.humid!=null?+SIM.humid:45, dew: units==="f"?50:10,
    wind: SIM.wind!=null?+SIM.wind:3, windDir: SIM.windDir!=null?+SIM.windDir:225,
    gust: (SIM.wind!=null?+SIM.wind:3)+2, cloud: SIM.cloud!=null?+SIM.cloud:0, vis:20000, isDay:1};
  fetchWeather();
  const ds=nowParts().dateStr;
  const cached=loadCache(ds);
  if(cached){ today=cached; if(cached.meta&&cached.meta.timezone) tz=cached.meta.timezone; lastDate=ds; render(); }
  try{
    today=await fetchTimings(ds);
    saveCache(ds,today);
    lastDate=ds;
    render();
  }catch(e){
    if(!today) showError("Could not load prayer times");
  }
  setInterval(tick,1000);
}

boot();
</script>
</body>
