<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prayer Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600&display=swap">
<style>
*{box-sizing:border-box}
html,body{margin:0;background:transparent}
body{color:#fff7df;
  --font-body:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-display:"Fraunces",Georgia,"Times New Roman",serif;
  font:14px var(--font-body);font-optical-sizing:auto;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.c{
  --g1:#0b1430;--g2:#070a1c;--g3:#0d1024;
  --glow:rgba(70,90,180,0);--horizon:rgba(40,40,90,0);--sunx:50%;--suny:30%;
  --accent:#f8d878;--accent2:#e8b24a;--text:#fff7df;
  --stars:1;--starblur:0px;--moon:1;
  --glass:inset 0 1px .5px #ffffff45,inset 0 -2px 5px #00000017,0 3px 8px #0000001f;
  position:relative;width:325px;height:530px;border-radius:28px;padding:15px;
  background:linear-gradient(160deg,var(--g1),var(--g2) 55%,var(--g3));
  box-shadow:0 18px 50px #0008;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
  color:var(--text);overflow:hidden}
/* register the sky/light custom props as typed so applyTheme()'s per-second writes INTERPOLATE
   instead of snapping — continuous time/weather colour transitions for free (Baseline 2024). */
@property --g1{syntax:"<color>";inherits:true;initial-value:#0b1430}
@property --g2{syntax:"<color>";inherits:true;initial-value:#070a1c}
@property --g3{syntax:"<color>";inherits:true;initial-value:#0d1024}
@property --accent{syntax:"<color>";inherits:true;initial-value:#f8d878}
@property --accent2{syntax:"<color>";inherits:true;initial-value:#e8b24a}
@property --text{syntax:"<color>";inherits:true;initial-value:#fff7df}
@property --glow{syntax:"<color>";inherits:true;initial-value:rgba(70,90,180,0)}
@property --horizon{syntax:"<color>";inherits:true;initial-value:rgba(40,40,90,0)}
@property --sunx{syntax:"<length-percentage>";inherits:true;initial-value:50%}
@property --suny{syntax:"<length-percentage>";inherits:true;initial-value:30%}
@media (prefers-reduced-motion:no-preference){
  .c{transition:--g1 1.1s linear,--g2 1.1s linear,--g3 1.1s linear,--accent 1.1s linear,--accent2 1.1s linear,--text 1.1s linear,--glow 1.1s linear,--horizon 1.1s linear,--sunx 1.1s linear,--suny 1.1s linear}
}

/* atmosphere: additive (screen) light driven by the sun's trajectory — a Mie
   forward-scatter bloom at the sun, and a Rayleigh horizon band that pools under
   the sun's azimuth (left at dawn, right at dusk). No discrete "rays": clear-sky
   scattering is smooth; shafts only read through cloud (see .godray). */
.atmo{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;border-radius:28px;mix-blend-mode:screen}
.atmo .sun{position:absolute;left:var(--sunx);top:var(--suny);width:360px;height:360px;transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--glow),transparent 64%);filter:blur(6px)}
/* CORNER SUN — a large, top-left-clipped daytime sun: a bright nucleus, a soft warm corona that slowly
   BREATHES (scale driven by simTime via --sunpulse, not a CSS loop), and faint radiating rays. Colour, size
   and height read the time of day — warm + low + broad corona at sunrise/sunset, white-hot + high + tight at
   noon — and weather mutes/cools it (--sunamt→0 at night). Anchored at the corner so most of the disc is
   clipped off-card, which keeps the header readable. All children screen-blend (parent .atmo). */
.atmo .suncorner{position:absolute;left:0;top:0;width:0;height:0;opacity:var(--sunamt,0);
  transform:translate(var(--sunx2,24px),var(--sunlift,14px));transition:opacity 1.5s ease,transform 2.4s ease}
.atmo .suncorner>div{position:absolute;left:0;top:0;border-radius:50%;will-change:transform;transition:background 1.6s linear}
.atmo .suncorner .disc{width:240px;height:240px;
  background:radial-gradient(circle,#fff 0%,#fff 20%,var(--suncore,#fff6e0) 42%,var(--sunmid,#ffcf8a) 66%,rgba(255,190,110,0) 88%);
  filter:blur(1.3px);transform:translate(-50%,-50%) scale(var(--sundisc,1)) scaleY(var(--sunflat,1))}   /* bright nucleus fading to RADIANCE; scaleY = low-sun atmospheric-refraction FLATTENING near the horizon */
.atmo .suncorner .corona{width:600px;height:600px;
  background:radial-gradient(circle,rgba(255,214,158,.4) 0%,rgba(255,198,128,.2) 24%,rgba(255,184,112,.075) 48%,rgba(255,170,100,0) 66%);
  filter:blur(10px);transform:translate(-50%,-50%) scale(var(--sunpulse,1))}   /* broad subordinate corona/radiance */
.atmo .suncorner .rays{width:850px;height:850px;opacity:var(--sunray,.32);
  background:repeating-conic-gradient(from 6deg,rgba(255,238,200,0) 0deg,rgba(255,238,200,.12) 3deg,rgba(255,238,200,0) 7.5deg,rgba(255,238,200,0) 17deg);
  -webkit-mask-image:radial-gradient(circle,#000 5%,rgba(0,0,0,.5) 26%,transparent 58%);
          mask-image:radial-gradient(circle,#000 5%,rgba(0,0,0,.5) 26%,transparent 58%);
  filter:blur(3px);transform:translate(-50%,-50%) scale(var(--sunpulse,1))}
.atmo .scatter{position:absolute;inset:0;background:radial-gradient(150% 96% at var(--sunx) 127%,var(--horizon),transparent 62%)}
.atmo .belt{position:absolute;inset:0;background:radial-gradient(135% 26% at var(--antix,50%) 120%,var(--belt,transparent),transparent 72%)}  /* Belt of Venus (anti-solar pink, civil twilight) */
.atmo .airglow{position:absolute;inset:0;background:radial-gradient(150% 40% at 50% 119%,var(--airglow,transparent),transparent 74%)}  /* night airglow + light-pollution dome low on the horizon */
/* FALSE DAWN (al-fajr al-kādhib, the zodiacal "wolf's tail"): a faint NARROW, TALL, VERTICAL cone of light rising
   from the EASTERN horizon BEFORE true dawn. It does NOT begin Fajr — purely contextual, deliberately distinct in
   SHAPE from true dawn (vertical, not horizontal) and never a warm sunrise colour. */
.atmo .falsedawn{position:absolute;inset:0;opacity:var(--falsedawn,0);transition:opacity 2s ease;mix-blend-mode:screen;
  background:radial-gradient(8% 44% at var(--dawnx,20%) 33%,rgba(214,220,242,.6),rgba(206,214,238,.12) 48%,transparent 72%)}  /* narrow TALL cone rising in the eastern sky above the horizon */
/* TRUE DAWN (al-fajr al-ṣādiq): a WIDE, SHORT, HORIZONTAL whiteness spreading ALONG the dashed 0° horizon — this
   is the light that begins Fajr. Faint cool white (the sky stays dark; NOT a bright sunrise palette). */
.atmo .truedawn{position:absolute;inset:0;opacity:var(--truedawn,0);transition:opacity 2s ease;mix-blend-mode:screen;
  background:radial-gradient(62% 9% at var(--dawnx,20%) 43%,rgba(230,234,250,.62),rgba(214,222,242,.14) 46%,transparent 64%)}  /* wide SHORT horizontal thread along the horizon */
/* ICE-CRYSTAL SOLAR OPTICS (only with thin CIRRUS / cold air — gated in atmosphere(), never random). Centre on the
   sun's screen position (--sunx/--suny), screen-blend. 22° HALO: a discrete ring, RED inner edge → BLUE outer, with
   a DARK inner gap (refraction, opposite a rainbow). SUNDOGS/parhelia: two bright spots at the halo radius LEFT and
   RIGHT of the sun at the SAME elevation + a faint horizontal parhelic-circle band. SUN PILLAR: a soft VERTICAL
   column above/below a LOW sun (plate-crystal reflection, not a beam). */
.atmo .sunhalo{position:absolute;left:var(--sunx);top:var(--suny);width:300px;height:300px;transform:translate(-50%,-50%);
  opacity:var(--sunhalo,0);mix-blend-mode:screen;filter:blur(1.4px);transition:opacity 2s;
  background:radial-gradient(circle,transparent 0,transparent 41%,rgba(255,176,138,.55) 45%,rgba(255,246,236,.34) 48.5%,rgba(188,206,255,.42) 53%,transparent 60%)}
.atmo .sundogs{position:absolute;left:var(--sunx);top:var(--suny);width:300px;height:64px;transform:translate(-50%,-50%);
  opacity:var(--sundogs,0);mix-blend-mode:screen;filter:blur(2px);transition:opacity 2s;
  background:radial-gradient(circle at 5% 50%,rgba(255,206,156,.85),rgba(255,248,238,.32) 26%,transparent 50%),radial-gradient(circle at 95% 50%,rgba(255,206,156,.85),rgba(255,248,238,.32) 26%,transparent 50%),linear-gradient(90deg,transparent,rgba(238,242,255,.16) 22%,rgba(238,242,255,.16) 78%,transparent)}
.atmo .sunpillar{position:absolute;left:var(--sunx);top:var(--suny);width:24px;height:250px;transform:translate(-50%,-50%);
  opacity:var(--sunpillar,0);mix-blend-mode:screen;filter:blur(4px);transition:opacity 1.6s;
  background:linear-gradient(180deg,transparent 2%,var(--pillarcol,rgba(255,206,150,.55)) 32%,var(--pillarcol,rgba(255,214,160,.6)) 50%,var(--pillarcol,rgba(255,206,150,.5)) 66%,transparent 98%)}
/* ANTICREPUSCULAR rays: the same parallel shafts as crepuscular but on the side OPPOSITE the sun, converging by
   perspective toward the antisolar point (--antix, at/below the far horizon); fainter than crepuscular. */
.atmo .anticrep{position:absolute;left:var(--antix,50%);top:122%;width:560px;height:560px;transform:translate(-50%,-50%);
  opacity:var(--anticrep,0);mix-blend-mode:screen;filter:blur(5px);transition:opacity 1.6s;
  background:repeating-conic-gradient(from 168deg,rgba(255,238,222,0) 0deg,rgba(255,238,222,.12) 2.6deg,rgba(255,238,222,0) 6.5deg,rgba(255,238,222,0) 15deg);
  -webkit-mask-image:radial-gradient(circle,#000 6%,rgba(0,0,0,.4) 30%,transparent 60%);
          mask-image:radial-gradient(circle,#000 6%,rgba(0,0,0,.4) 30%,transparent 60%)}
/* high-latitude aurora: faint green→blue curtains in the upper sky, conditional (|lat|≳55°, deep night, clear).
   Static glow gated by --aurora (no decorative loop) — its presence/strength is the state-driven part. */
.atmo .aurora{position:absolute;left:0;right:0;top:0;height:54%;opacity:var(--aurora,0);transition:opacity 2.5s;filter:blur(4px);
  background:repeating-linear-gradient(94deg,rgba(120,255,190,0) 0 13px,rgba(120,255,190,.05) 16px,rgba(120,255,190,0) 30px),
            linear-gradient(180deg,rgba(70,230,170,.17) 0,rgba(90,180,255,.10) 40%,transparent 74%);
  -webkit-mask-image:linear-gradient(180deg,transparent 4%,#000 30%,#000 55%,transparent 92%);
          mask-image:linear-gradient(180deg,transparent 4%,#000 30%,#000 55%,transparent 92%)}
/* filmic grain / atmospheric noise — kills gradient banding, adds texture */
.grain{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:var(--grain,.5);mix-blend-mode:soft-light;transition:opacity 1.4s}
/* heat/cold climate cues — soft-light tints + a frost vignette, all behind the foreground (z-index 0)
   so only the SKY is tinted, never the prayer panel/text. Driven by --warm/--cool/--frost from the
   apparent-temperature (feels-like) weather driver. */
.climate{position:absolute;inset:0;z-index:0;pointer-events:none;border-radius:28px;overflow:hidden}
.climate>div{position:absolute;inset:0;transition:opacity 1.6s ease}
.climate .tintw{background:#ff9a3c;mix-blend-mode:soft-light;opacity:var(--warm,0)}
.climate .tintc{background:#7fb0ff;mix-blend-mode:soft-light;opacity:var(--cool,0)}
.climate .frost{background:radial-gradient(125% 95% at 50% 46%,transparent 50%,#cfe6ff 128%);mix-blend-mode:screen;opacity:var(--frost,0)}
/* heat band: a warm low-sky tint whose strength scales with apparent temperature (--heat). No decorative
   bobbing loop — it's a static, state-driven tint (a real refractive shimmer would need a per-frame filter). */
.climate .heatwave{top:auto;height:42%;background:linear-gradient(0deg,rgba(255,206,150,calc(.13*var(--heat,0))),transparent 85%);mix-blend-mode:soft-light}
/* top metadata scrim — protects the location/weather header from dissolving into the cloud
   texture; only revealed in busy weather, so clear skies stay clean (no darkening). */
.scrim{position:absolute;top:0;left:0;right:0;height:64px;z-index:1;pointer-events:none;opacity:0;transition:opacity .9s;
  background:linear-gradient(180deg,rgba(8,11,20,.5),rgba(8,11,20,.2) 52%,transparent)}
.c[data-fx=cloud] .scrim,.c[data-fx=overcast] .scrim,.c[data-fx=fog] .scrim,.c[data-fx=drizzle] .scrim,.c[data-fx=rain] .scrim,.c[data-fx=thunder] .scrim,.c[data-fx=snow] .scrim{opacity:1}

/* sky background: stars + moon */
.sky{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.stars{opacity:var(--stars);filter:blur(var(--starblur));transition:opacity .8s,filter .8s}
/* per-star twinkle subtracts its own --amp from its own base opacity --o (set inline by buildStars),
   so each star scintillates independently at its own phase/rate instead of in lockstep */
@keyframes tw{0%,100%{opacity:var(--o,.85)}50%{opacity:calc(var(--o,.85) - var(--amp,.18)*var(--star-turb,1))}}
/* rare BRIGHT anchor stars: a soft halo (so the field reads as a few luminaries over a faint dust bed, not a
   uniform wallpaper) + a 4-ray diffraction glint that tracks them (positioned in projectStars). */
.stars circle.br{filter:drop-shadow(0 0 2.6px var(--hc,#e4eeff)) drop-shadow(0 0 7px var(--hc,#c2d2ff))}   /* soft COLOURED halo in the luminary's own hue */
.starglints{opacity:var(--stars);filter:blur(var(--starblur))}
.starglints g{mix-blend-mode:screen}
.starglints line{stroke:#f2f6ff;stroke-width:.7;stroke-linecap:round;filter:blur(.3px)}
/* reduced-motion: stop ALL atmospheric/weather motion — including the thunder flash (photosensitivity) */
@media (prefers-reduced-motion:reduce){
  .stars circle,.wfx .fog,.wfx .drop,.wfx .flake,.wfx .flash,.wfx .bolt,
  .climate .heatwave,.atmo .sun,.atmo .scatter,.milkyway{animation:none!important}
}
/* battery: a 24/7 iframe must not repaint when the user can't see it. Paused when the tab is hidden
   OR the widget is scrolled offscreen (set by an IntersectionObserver + visibilitychange in JS). */
.c.paused *,.c.paused{animation-play-state:paused!important}
.milkyway{opacity:var(--mw,0);transform-box:fill-box;transform-origin:center;transform:rotate(var(--mwtilt,0deg));transition:opacity 1.6s ease,transform 4s linear}
.moon{opacity:var(--moongrp,1);transition:opacity 1.2s,transform 1.6s linear}   /* new moon invisible (--moongrp); transform eases so the moon GLIDES along its path */
.mbeam{fill:#cdd9f5;filter:blur(26px);mix-blend-mode:screen;opacity:var(--moonbeam,0);transition:opacity 1.4s}  /* directional moonlight: present only for a real above-horizon moon */
/* debug fast-forward: a small simulated-clock read-out, only shown when ?timeScale= is set */
.simclock{position:absolute;left:8px;top:6px;z-index:6;display:none;font:10px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#fff;background:rgba(8,11,20,.55);padding:2px 7px;border-radius:7px;letter-spacing:.02em;pointer-events:none;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.dbglayers{position:absolute;right:6px;bottom:6px;z-index:6;display:none;white-space:pre;font:9px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#cfe0ff;background:rgba(8,11,20,.62);padding:4px 7px;border-radius:7px;pointer-events:none;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.dbgmoon{position:absolute;left:6px;bottom:6px;z-index:6;display:none;white-space:pre;font:9px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#ffe0c0;background:rgba(8,11,20,.62);padding:4px 7px;border-radius:7px;pointer-events:none;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.c.fast,.c.fast *{transition:none!important}   /* fast-forward: snap every layer (sky, moon position/opacity, clouds) each frame — dense frames read smooth, no lagging/lurching/see-through mid-transition */
.moccluder{fill:var(--moon-sky,#0b1430);opacity:var(--moonocc,1);transition:opacity .9s}  /* opaque only when stars are out (hides them); 0 in daylight so no ghost moon by day */
.mfeatures{opacity:var(--moonfeat,1);transition:opacity .9s}
/* 22° ice halo (refraction ring) and water-droplet corona (diffraction aureole) — two DISTINCT optical elements,
   each gated by cloud type / humidity in paint(); never both prominent at once. */
.mhalo{fill:url(#mhalog);mix-blend-mode:screen;filter:blur(2.5px);opacity:var(--mhalo,0);transition:opacity 1.8s}
.mparhelia{mix-blend-mode:screen;filter:blur(1.6px);opacity:var(--mparhelia,0);transition:opacity 1.8s}   /* lunar moondogs */
.mcorona{fill:url(#mcoronag);mix-blend-mode:screen;filter:blur(3px);opacity:var(--mcorona,0);transition:opacity 1.4s}
.mglow{fill:url(#mglowg);filter:blur(2px);mix-blend-mode:screen;opacity:calc(var(--mgo,.2) * var(--mrad,1))}   /* halo radiance breathes via --mrad (simTime + humidity), set in paint() */

/* weather effects: animated overlay, behind the foreground (z-index 1) */
.wfx{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;border-radius:28px}
.wfx .veil{position:absolute;inset:0;opacity:0;transition:opacity .9s;
  background:linear-gradient(180deg,#262e3600,#222831 96%)}
/* CLOUD DECKS render to a small <canvas> (the JS CLOUD ENGINE paints an evolving 3D-noise density field).
   CSS upscales the tiny buffer and blurs it — the blur both smooths the upscale and softens the cloud edges.
   A gentle vertical mask keeps the very top (header) and very bottom (grid) clear; the density field's own
   band weighting concentrates cloud around the horizon. Coverage/advection/evolution all live in JS. */
.wfx .cloudcanvas{position:absolute;inset:0;width:100%;height:100%;filter:blur(.55px);
  -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 3%,#000 24%,transparent 34%);
          mask-image:linear-gradient(180deg,transparent 0,#000 3%,#000 24%,transparent 34%)}
.wfx .sunhaze{position:absolute;left:var(--sunx);top:var(--suny);width:300px;height:300px;transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--glow),transparent 56%);mix-blend-mode:screen;filter:blur(7px);opacity:0;transition:opacity 1s}
/* CREPUSCULAR RAYS (light shafts): soft radial shafts emanating from the sun's screen position, revealed
   only by --ray (sun up + broken cloud + participating haze; 0 in clear-dry or solid-overcast sky). Behind
   the arc/text. The shafts come from the conic gradient; the radial mask fades them out from the source. */
.wfx .godray{position:absolute;left:var(--sunx);top:var(--suny);width:560px;height:560px;transform:translate(-50%,-50%);pointer-events:none;
  background:repeating-conic-gradient(from 8deg,rgba(255,247,228,0) 0deg,rgba(255,247,228,.16) 2.4deg,rgba(255,247,228,0) 6.5deg,rgba(255,247,228,0) 15deg);
  -webkit-mask-image:radial-gradient(circle,#000 4%,rgba(0,0,0,.42) 26%,transparent 62%);
          mask-image:radial-gradient(circle,#000 4%,rgba(0,0,0,.42) 26%,transparent 62%);
  mix-blend-mode:screen;filter:blur(6px);opacity:var(--ray,0);transition:opacity 1.4s}
.wfx .fog{position:absolute;left:-22%;right:-22%;height:48px;opacity:0;filter:blur(9px);transition:opacity 1s;
  background:linear-gradient(90deg,transparent,#cdd3d9b3 45%,#cdd3d966 60%,transparent);animation:fogdrift linear infinite}
/* rain ORIGINATES at the cloud deck (≈the horizon band, top:24%) and streaks down from there — not from above
   the whole card — so drops belong to the clouds overhead. Slants with the live wind via --rain-slant. */
.wfx .drop{position:absolute;top:19%;width:1.5px;height:14px;border-radius:2px;display:none;will-change:transform;
  background:linear-gradient(#b9dcf500,#b9dcf5cc);animation:fall linear infinite}
.wfx .flake{position:absolute;top:-6%;border-radius:50%;display:none;background:#eef4ff;box-shadow:0 0 3px #dfeaffaa;will-change:transform;animation:snowfall linear infinite}
.wfx .flash{position:absolute;inset:0;opacity:0;mix-blend-mode:screen;
  background:radial-gradient(115% 60% at 60% 9%,#eaecffe6,#c2b6ff77 26%,#9aa0ff22 44%,transparent 60%)}  /* localized on the upper cloud DECK, not the whole screen */
.wfx .bolt{position:absolute;inset:0;width:100%;height:100%;opacity:0}
.wfx .bolt path{fill:none;stroke:#f6f8ff;stroke-width:1.4;stroke-linejoin:round;stroke-linecap:round;
  filter:drop-shadow(0 0 1.5px #fff) drop-shadow(0 0 5px #b6c2ff) drop-shadow(0 0 13px #6f8cff)}   /* bright electric core + layered blue glow */
/* fog is transported monotonically by the wind too (one direction, linear), not swept back and forth */
@keyframes fogdrift{from{transform:translateX(calc(var(--wind-dir,1)*-12%))}to{transform:translateX(calc(var(--wind-dir,1)*14%))}}
/* precipitation slants with the live wind (--rain-slant / --snow-slant, px of horizontal drift over the
   fall). Base = 0 (vertical) in calm air; snow slants ~2.5× rain for the same wind (far lower fall speed). */
/* rain falls from the cloud deck and FADES OUT in the lower sky (≈the horizon band), so streaks belong to the
   clouds overhead and never rain over the opaque prayer list below. */
@keyframes fall{0%{transform:translate(0,-10px);opacity:0}22%{opacity:var(--rain-op,.75)}60%{opacity:var(--rain-op,.75)}100%{transform:translate(var(--rain-slant,0px),132px);opacity:0}}
@keyframes snowfall{0%{transform:translate(0,-14px);opacity:0}10%{opacity:.95}25%{transform:translate(calc(var(--snow-slant,0px)*.22 + 8px),128px)}50%{transform:translate(calc(var(--snow-slant,0px)*.5 - 6px),280px)}75%{transform:translate(calc(var(--snow-slant,0px)*.78 + 8px),420px)}90%{opacity:.95}100%{transform:translate(var(--snow-slant,0px),560px);opacity:0}}
/* lightning: an irregular multi-strike pattern (not a fixed metronome). Three strikes at non-uniform offsets
   over a long period; flash + bolt run at different (coprime-ish) periods so the combined cadence doesn't
   obviously repeat across a 15–60s watch. Deterministic, reduced-motion-gated. */
/* a faint PERSISTENT storm-glow baseline (.07) so the thunderstorm reads at a glance between strikes, plus the
   bright irregular strikes with a slightly longer residual tail. */
@keyframes flash{0%,100%{opacity:.07}2%{opacity:.88}3.2%{opacity:.18}4%{opacity:.62}6.5%{opacity:.12}9%{opacity:.07}
  37%{opacity:.07}38%{opacity:.78}39.3%{opacity:.16}40.6%{opacity:.56}43.5%{opacity:.1}46%{opacity:.07}
  72%{opacity:.07}73%{opacity:.94}74.4%{opacity:.24}76.5%{opacity:.1}79%{opacity:.07}}
/* reveal per condition */
/* cloud-deck coverage is data-driven (cloudState.covLow/Mid/High in JS → canvas density field), not CSS vars. */
.c[data-fx=cloud]   .sunhaze{opacity:.45}
.c[data-fx=drizzle] .sunhaze{opacity:.22}
.c[data-fx=cloud]    .veil{opacity:.3}
.c[data-fx=overcast] .veil{opacity:.72}
.c[data-fx=drizzle]  .veil{opacity:.46}
.c[data-fx=rain]     .veil{opacity:.62}
.c[data-fx=thunder]  .veil{opacity:.74}
.c[data-fx=fog]      .veil{opacity:.5}
.c[data-fx=snow]     .veil{opacity:.34}
.c[data-fx=fog]      .fog{opacity:.62}
.c[data-fx=rain]     .drop,.c[data-fx=thunder] .drop{display:block}
.c[data-fx=drizzle]  .drop:nth-child(3n+1){display:block;opacity:.6;animation-duration:.85s}
.c[data-fx=thunder]  .drop{animation-duration:.4s}
.c[data-fx=snow]     .flake{display:block}
.c[data-fx=thunder]  .flash{animation:flash 19s linear infinite}
.c[data-fx=thunder]  .bolt{animation:flash 23s linear infinite -4s}

/* header — LIQUID-GLASS BELT (corrected geometry): NOT one full-width pill. Two CONTENT-FIT frosted straps
   (location-left, temperature-right), each sized to its text + symmetric VISIBLE padding, flanking a circular
   icon BUCKLE (~25px) that sits ABOVE them (z-index) and CUTS the belt — the strap tucks 7px UNDER the buckle
   (negative margin) and the buckle covers it, so no strap shows behind the buckle. Straps are THINNER (18px) than
   the buckle. Inner padding = outer + tuck, so the gap buckle→text equals the gap text→strap-end. Subtle inner
   glass only — NO heavy drop shadow (matches the prayer cells). .h has a FIXED height so layout/footer never move. */
.h{position:relative;z-index:2;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  height:25px;box-sizing:border-box;margin:0 0 12px;padding:0;background:none;border:none;box-shadow:none}
.e,.wt{box-sizing:border-box;height:18px;max-width:128px;display:flex;align-items:center;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(44,52,76,.18) 52%,rgba(10,16,30,.26));  /* a top sheen fading to a DARK-tinted base, so the strap reads over BRIGHT skies too (not just night) */
  -webkit-backdrop-filter:blur(8px) saturate(1.2);backdrop-filter:blur(8px) saturate(1.2);
  border:1px solid rgba(255,255,255,.17);box-shadow:inset 0 1px .5px rgba(255,255,255,.36)}
.e{justify-self:end;padding:0 18px 0 15px;margin-right:-7px;border-radius:9px 3px 3px 9px;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:color-mix(in srgb,var(--accent) 30%,#fff)}
.wt{justify-self:start;padding:0 15px 0 18px;margin-left:-7px;border-radius:3px 9px 9px 3px;font-size:12px;font-weight:600;color:var(--text);opacity:.96}
/* BUCKLE — ~25px, ABOVE the straps (z-index 3) so it CUTS the belt; subtle inner glass, no heavy drop shadow */
.buckle{position:relative;z-index:3;justify-self:center;width:25px;height:25px;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at 50% 32%,rgba(255,255,255,.37),rgba(150,170,210,.13) 60%,rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.37);
  box-shadow:inset 0 1px 1.2px rgba(255,255,255,.62),inset 0 -1.5px 2.5px rgba(8,12,24,.24)}
.wi{font-size:13px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.34))}

/* prayer panel */
.panel{position:relative;z-index:1}
.arc{display:block;width:100%;height:180px;margin:0;overflow:visible}
.foc{position:absolute;left:0;right:0;top:57.5px;text-align:center}
.foc .cn{position:relative;top:4px;font-family:var(--font-display);font-size:30px;line-height:1.15;font-weight:600;letter-spacing:-.015em;color:var(--text);opacity:.95;margin-bottom:30.6px}
.foc .nt{position:relative;top:4.4px;font-family:var(--font-display);font-size:46px;line-height:1;font-weight:600;letter-spacing:.005em;color:var(--accent)}
.arc .horizon{stroke:#ffffff;stroke-opacity:.16;stroke-width:1;stroke-dasharray:2.5 5}
/* layered arc for legibility over cloud/rain without going thick or cartoonish:
   railsh = a soft dark shadow under the WHOLE arc (separation); rail = the secondary base/future
   arc; warmsh = a faint dark shadow under the ACTIVE stroke (weather-gated); warm = the active
   accent body with its existing glow (unchanged); warmcore = a thin crisp accent core on top. */
.arc .railsh{fill:none;stroke:#070b16;stroke-opacity:.26;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:blur(1.6px)}
.arc .rail{fill:none;stroke:#ffffff;stroke-opacity:.3;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.arc .warmsh{fill:none;stroke:#05070f;stroke-opacity:0;stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round;filter:blur(2px)}
.arc .warm{fill:none;stroke:var(--accent);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px var(--accent))}
.arc .warmcore{fill:none;stroke:color-mix(in srgb,var(--accent) 78%,#fff);stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.arc .dot{fill:#ffffff;fill-opacity:.72}
.arc .dot.next{fill:var(--accent)}
/* high-latitude: Fajr/Isha that are method-ESTIMATED (sun never reaches the depression angle) read as a
   hollow ring, not a solid crossing dot — honest about the adjustment. */
.arc .dot.adj{fill-opacity:.12;stroke:#fff;stroke-opacity:.6;stroke-width:1.1;stroke-dasharray:1.6 1.6}
.arc .dot.adj.next{stroke:var(--accent);stroke-opacity:.85}
/* Sunrise is an astronomical event, not a prayer → a clean hollow RING (solid, distinct from the dashed "estimated" style) */
.arc .dot.ring{fill-opacity:0;stroke:#fff;stroke-opacity:.6;stroke-width:1.3}
.arc .dot.ring.next{stroke:var(--accent);stroke-opacity:.92}
.arc .cur{fill:none;stroke:#fff;stroke-width:2.5;filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.5))}
/* bar mirrors the arc's light system: a dark inset track, then the active fill as a soft accent
   glow (box-shadow, same --accent as the arc) under a crisp gradient on top. No overflow:hidden so
   the glow can breathe and the fill keeps a rounded luminous tip. */
.bar{position:relative;height:6px;border-radius:6px;background:#ffffff12;margin-top:16px;box-shadow:inset 0 1px 2px rgba(0,0,0,.42)}
.bar>i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 5px color-mix(in srgb,var(--accent) 58%,transparent);transition:width .9s linear}
/* busy weather: deepen the dark separation and lift the accent glow a touch — elegant, not neon. */
.c[data-fx=cloud] .arc .railsh,.c[data-fx=overcast] .arc .railsh,.c[data-fx=fog] .arc .railsh,.c[data-fx=drizzle] .arc .railsh,.c[data-fx=rain] .arc .railsh,.c[data-fx=thunder] .arc .railsh,.c[data-fx=snow] .arc .railsh{stroke-opacity:.58}
.c[data-fx=cloud] .arc .warmsh,.c[data-fx=overcast] .arc .warmsh,.c[data-fx=fog] .arc .warmsh,.c[data-fx=drizzle] .arc .warmsh,.c[data-fx=rain] .arc .warmsh,.c[data-fx=thunder] .arc .warmsh,.c[data-fx=snow] .arc .warmsh{stroke-opacity:.5}
.c[data-fx=cloud] .bar,.c[data-fx=overcast] .bar,.c[data-fx=fog] .bar,.c[data-fx=drizzle] .bar,.c[data-fx=rain] .bar,.c[data-fx=thunder] .bar,.c[data-fx=snow] .bar{box-shadow:inset 0 1px 2.5px rgba(0,0,0,.6)}
.c[data-fx=cloud] .bar>i,.c[data-fx=overcast] .bar>i,.c[data-fx=fog] .bar>i,.c[data-fx=drizzle] .bar>i,.c[data-fx=rain] .bar>i,.c[data-fx=thunder] .bar>i,.c[data-fx=snow] .bar>i{box-shadow:0 0 7px color-mix(in srgb,var(--accent) 76%,transparent)}
.left{display:block;text-align:center;margin-top:3.3px;color:var(--text);font-size:17.25px;font-weight:400;line-height:1.2;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
/* countdown line reads in three roles: the time is the value (UI-mono + tabular, the
   brightest part so it's read first); "left until" is quiet connective tissue; the prayer
   name borrows the display face AND the --accent colour so it stays tied to the hero time
   and the prayer-name system. text-shadow is inherited from .left (dark micro-rim, no glow). */
.left .until-time{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:500;letter-spacing:-.01em;opacity:.92}
.left .until-label{opacity:.6;font-family:var(--font-body)}   /* words stay Inter; the spaces around them inherit .left's mono so every gap is one even monospace space */
.left .until-prayer{font-family:var(--font-display);font-weight:600;font-size:20.25px;color:var(--accent)}

/* prayer-times grid */
.times{position:relative;z-index:1;display:grid;grid-template-columns:1fr;gap:6px;margin-top:9.6px}
.p{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:5px 9px;border-radius:11px;background:linear-gradient(160deg,#ffffff26,#ffffff0d);border:1px solid #ffffff2e;-webkit-backdrop-filter:blur(7px) saturate(135%);backdrop-filter:blur(7px) saturate(135%);box-shadow:var(--glass);transition:opacity .3s,background .3s}
.p.on{background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 30%,transparent),color-mix(in srgb,var(--accent) 12%,transparent));border-color:color-mix(in srgb,var(--accent) 50%,transparent)}
.p.now{box-shadow:var(--glass),inset 0 0 0 1.5px color-mix(in srgb,var(--text) 55%,transparent)}
.p.past{opacity:.42}
.p b{font-weight:600;font-size:12.5px;line-height:16.7px;letter-spacing:.01em}
.tm{font-weight:600;font-size:12.5px;line-height:16.7px}

/* dates */
.d{position:relative;z-index:1;direction:ltr;display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-top:8px;padding:0 10px;color:color-mix(in srgb,var(--text) 90%,transparent);font-size:11.5px;line-height:1.2}
.d span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{opacity:.55;font-size:.84em;margin:0 4px;letter-spacing:.05em;unicode-bidi:isolate}
#ah .er{font-size:1.3em;opacity:.66}   /* the Arabic hāʾ (AH marker) reads small — give it a few pt */
.mph{font-size:.92em;unicode-bidi:isolate}   /* moon-phase emoji by the AH date (own class — .moon is the sky moon) */
.mph.pre{opacity:.6}                    /* faint preview of the Hijri day that begins at tonight's Maghrib */

/* readability over busy cloud/rain midtones: a crisp dark micro-rim + soft depth (NO heavy
   outline that would muddy the serif, NO cheap white glow). Dates + glass cells keep a light shadow. */
.d{text-shadow:0 0 1px rgba(4,8,16,.85),0 1px 2px rgba(0,0,0,.55),0 2px 5px rgba(0,0,0,.3)}
.p b,.tm{text-shadow:0 1px 2px rgba(0,0,0,.28)}
.e,.wi,.wt{text-shadow:0 0 1px rgba(4,8,16,.92),0 1px 1px rgba(4,8,16,.6),0 2px 5px rgba(0,0,0,.42)}
.foc .cn,.left{text-shadow:0 0 1px rgba(6,10,18,.88),1px 0 1px rgba(6,10,18,.5),-1px 0 1px rgba(6,10,18,.5),0 1px 1px rgba(6,10,18,.6),0 3px 7px rgba(0,0,0,.4)}
/* the hero time: strongest rim + depth, plus a faint accent-tinted bloom (warm by day, cool by
   night via --accent) for atmosphere — never a white glow. */
.foc .nt{text-shadow:0 0 1px rgba(0,0,0,.95),1px 0 1px rgba(0,0,0,.6),-1px 0 1px rgba(0,0,0,.6),0 1px 1px rgba(0,0,0,.7),0 2px 3px rgba(0,0,0,.55),0 5px 13px rgba(0,0,0,.4),0 0 16px color-mix(in srgb,var(--accent) 15%,transparent)}
/* tabular figures so the per-second countdown, times and dates never jitter */
.foc .nt,.left,.tm,.d,.wt{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
</style>
</head>
<body>
<div class="c">
  <div class="simclock" aria-hidden="true"></div>
  <div class="dbglayers" aria-hidden="true"></div>
  <div class="dbgmoon" aria-hidden="true"></div>
  <div class="atmo" aria-hidden="true"><div class="airglow"></div><div class="aurora"></div><div class="falsedawn"></div><div class="truedawn"></div><div class="scatter"></div><div class="belt"></div><div class="anticrep"></div><div class="sunpillar"></div><div class="sunhalo"></div><div class="sundogs"></div><div class="sun"></div><div class="suncorner"><div class="rays"></div><div class="corona"></div><div class="disc"></div></div></div>
  <svg class="sky" viewBox="0 0 325 530" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <radialGradient id="mg" cx="40%" cy="34%" r="72%">
        <stop offset="0%" stop-color="#27334f"/><stop offset="65%" stop-color="#18223e"/><stop offset="100%" stop-color="#0e1630"/>
      </radialGradient>
      <radialGradient id="mwglow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#cdd6ef" stop-opacity=".22"/><stop offset="55%" stop-color="#b9c4e6" stop-opacity=".07"/><stop offset="100%" stop-color="#b9c4e6" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="mglowg" cx="50%" cy="50%" r="50%">   <!-- moon atmospheric glow: soft falloff (no plateau/ring), already faint where it meets the disc edge -->
        <stop offset="0%" stop-color="#dfe6f2" stop-opacity=".40"/><stop offset="40%" stop-color="#cfe0f2" stop-opacity=".18"/>
        <stop offset="72%" stop-color="#bcd0ee" stop-opacity=".045"/><stop offset="100%" stop-color="#bcd0ee" stop-opacity="0"/>
      </radialGradient>
      <!-- 22° ICE-crystal HALO (refraction through cirrus): a discrete RING at a fixed radius with a DARK inner
           gap, a sharp REDDISH inner edge and a fuzzy BLUISH outer edge (colour order opposite a rainbow). -->
      <radialGradient id="mhalog" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#ffcaa6" stop-opacity="0"/>
        <stop offset="55%" stop-color="#ffcaa6" stop-opacity="0"/>
        <stop offset="62%" stop-color="#ffb892" stop-opacity=".85"/>
        <stop offset="68%" stop-color="#fff2e2" stop-opacity=".48"/>
        <stop offset="75%" stop-color="#bcd2ff" stop-opacity=".5"/>
        <stop offset="86%" stop-color="#bcd2ff" stop-opacity="0"/>
      </radialGradient>
      <!-- water-droplet CORONA (diffraction through thin altostratus/fog): a small near-white aureole fringed
           yellow/red, then pastel rings bluish-inner → green → yellow → red-outer, HUGGING the disc. -->
      <radialGradient id="mparhg" cx="50%" cy="50%" r="50%">   <!-- moondog spot: warm-white near the moon → cool/transparent outward -->
        <stop offset="0%" stop-color="#fff6e6" stop-opacity=".85"/><stop offset="38%" stop-color="#ffe0c2" stop-opacity=".42"/>
        <stop offset="70%" stop-color="#dfe6ff" stop-opacity=".2"/><stop offset="100%" stop-color="#dfe6ff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="mcoronag" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#fffdf5" stop-opacity=".8"/>
        <stop offset="30%" stop-color="#fff2d6" stop-opacity=".55"/>
        <stop offset="42%" stop-color="#ffd6ac" stop-opacity=".4"/>
        <stop offset="53%" stop-color="#bcd4ff" stop-opacity=".34"/>
        <stop offset="63%" stop-color="#c6f0c0" stop-opacity=".26"/>
        <stop offset="73%" stop-color="#fff0bc" stop-opacity=".24"/>
        <stop offset="84%" stop-color="#ffc4a4" stop-opacity=".2"/>
        <stop offset="100%" stop-color="#ffc4a4" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <g class="milkyway"></g>
    <g class="stars"></g>
    <g class="starglints"></g>
    <g class="moon" transform="translate(250 64) scale(0.62)">
      <circle class="mbeam" r="135"/>                 <!-- moonlight cast on the sky (only a real, above-horizon moon) -->
      <circle class="mhalo" r="120"/>                 <!-- 22° ICE-crystal halo ring (cirrus); shown only with thin high cloud -->
      <g class="mparhelia"><circle cx="-118" cy="0" r="20" fill="url(#mparhg)"/><circle cx="118" cy="0" r="20" fill="url(#mparhg)"/></g>  <!-- lunar PARASELENAE (moondogs): lateral spots at the 22° radius; rare, bright moon + cirrus -->
      <circle class="mcorona" r="84"/>                <!-- water-droplet diffraction CORONA aureole (altostratus/fog/humidity) -->
      <circle class="moccluder" r="45"/>              <!-- opaque star-occluder. The canvas disc only fills ~r46.4 of the 96px image (120→96 slice), so this MUST be < that or its dark fill PEEKS past the bright disc as a contrast ring. r45 stays fully hidden behind the opaque disc. -->
      <g class="mfeatures">                            <!-- everything that dissolves at dawn/dusk lives here -->
        <circle class="mglow" r="58"/>                                  <!-- SUBTLE atmospheric glow (radial gradient) BEHIND the opaque disc — not a stroke on the limb, not the dominant element -->
        <image class="mphoto" href="" x="-48" y="-48" width="96" height="96" preserveAspectRatio="xMidYMid slice"/>
      </g>
    </g>
  </svg>

  <div class="wfx" id="wxfx" aria-hidden="true">
    <!-- CLOUD DECKS: an evolving 3D-noise density field painted to a small canvas (see the CLOUD ENGINE in JS).
         Wind advects it while the time-axis morphs it in place — live cloud, not a scrolled static texture.
         The buffer is tiny (72×118); CSS upscales + blurs it, which also hides any pixel structure. -->
    <canvas class="cloudcanvas" width="144" height="232" aria-hidden="true"></canvas>
    <div class="veil"></div>
    <div class="sunhaze"></div>
    <div class="godray" aria-hidden="true"></div>
    <svg class="bolt" viewBox="0 0 325 530" preserveAspectRatio="none"><path d="M214 4 L201 60 L220 56 L198 150"/></svg>
    <div class="flash"></div>
  </div>
  <svg class="grain" viewBox="0 0 325 530" preserveAspectRatio="none" aria-hidden="true">
    <filter id="grainf" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="5" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 0 1"/>
    </filter>

  <div class="climate" aria-hidden="true"><div class="tintw"></div><div class="tintc"></div><div class="frost"></div><div class="heatwave"></div></div>

</div>

<script>
"use strict";
// ---- config from URL hash ------------------------------------------------
const q     = new URLSearchParams(location.hash.slice(1));
const lat   = q.get("lat");
const lon   = q.get("lon");
let tz      = q.get("tz")    || "America/New_York";   // a hint/fallback; the real zone is adopted from the location (see fetchTimings)
const label = q.get("label") || "";
const method= q.get("method")|| "2";
const school= q.get("school")|| "0";
const fmt24 = (q.get("time") || "24") !== "12";
const units = (q.get("units") || "f").toLowerCase() === "c" ? "c" : "f";
// datefmt is now a token format string (YYYY MM DD MMMM …). The old preset keys
// still work for backward compatibility with existing embeds.
const DATEFMT_PRESETS = {iso:"YYYY-MM-DD", us:"MM/DD/YYYY", eu:"DD/MM/YYYY", long:"DD MMMM YYYY"};
const dfRaw = q.get("datefmt") || "iso";
const datefmtStr = DATEFMT_PRESETS[dfRaw.toLowerCase()] || dfRaw;

// ---- simulation overrides (only active when present in the hash) ----------
// Lets you preview any condition without waiting for the real clock/weather:
//   simTime=HH:MM   force the wall clock   simWx=<WMO code>  force weather
//   simMoon=0..1    force illuminated frac simWax=1|0        force waxing/waning
//   simMoonAlt=<deg> force moon altitude    simMoonH=<deg>   force moon hour angle (−180 rising .. +180 setting)
//   simTemp=<n>     force the shown temp     simFeels=<n>     force apparent (feels-like) temp
//   simWind=<m/s>   simWindDir=<deg FROM>    simHumid=<RH %>  simCloud=<cover %>
const SIM = {
  time: q.get("simTime"),
  wx:   q.get("simWx"),
  temp: q.get("simTemp"),
  moon: q.get("simMoon"),
  wax:  q.get("simWax"),
  moonAlt: q.get("simMoonAlt"),
  moonH:   q.get("simMoonH"),
  feels:   q.get("simFeels"),
  wind:    q.get("simWind"),
  windDir: q.get("simWindDir"),
  humid:   q.get("simHumid"),
  cloud:   q.get("simCloud"),
  precip:  q.get("simPrecip"),   // observed precip (mm) for QA of the precip/thunder gate: e.g. simWx=95&simPrecip=0 ⇒ dry forecast-thunder ⇒ downgraded
};

const prayers = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
const real    = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];
// light-pollution dial (0 pristine dark-sky … 1 inner-city). No global light-pollution dataset ships inline, so
// this is an honest user-set value via ?lp= ; it raises the night-sky background, warms the horizon dome, and
// erases the Milky Way + faint stars. Default 0 (assume dark) so nothing changes unless set.
const LPOLL = Math.min(1, Math.max(0, +q.get("lp") || 0));
const DEBUGLAYERS = q.get("debugLayers")==="1";   // ?debugLayers=1 → live read-out of every sky/cloud layer opacity
const DEBUGMOON = q.get("debugMoon")==="1";       // ?debugMoon=1 → moon layer radii/opacities + a pixel-ring across the limb
const DEBUGDAWN = q.get("debugDawn");             // ?debugDawn=false|true → force the false-dawn / true-dawn layer for inspection
const DEBUGOPTIC = q.get("debugOptic");           // ?debugOptic=halo|sundogs|pillar|anticrep|paraselene → force a (condition-gated) optical phenomenon
const QA = q.get("qa")==="1";                     // ?qa=1 → force the forecast track on boot + expose window.qaState() frame-diff metrics

// ---- helpers -------------------------------------------------------------
const $    = s => document.querySelector(s);
const pad  = n => String(n).padStart(2,"0");
const enc  = encodeURIComponent;
const sleep= ms => new Promise(r=>setTimeout(r,ms));
const clamp= x => Math.min(1,Math.max(0,x));
const clean= t => String(t).replace(/\s*\(.+\)\s*/,"").trim();
const mins = t => { const [h,m]=clean(t).split(":").map(Number); return h*60+m; };
const fmt  = t => {
  const [h,m]=clean(t).split(":").map(Number);
  if(fmt24) return `${pad(h)}:${pad(m)}`;

// ---- prayer-times data: fetch + cache + retry ---------------------------
const cacheKey = "salah:"+[lat,lon,tz,method,school].join("|");
function loadCache(dateStr){
  try{ const j=JSON.parse(localStorage.getItem(cacheKey)); if(j&&j.date===dateStr) return j.data; }catch(e){}
  return null;
}
function saveCache(dateStr,data){
  try{ localStorage.setItem(cacheKey,JSON.stringify({date:dateStr,data})); }catch(e){}
}
async function fetchTimings(dateStr){
  // No timezonestring: let Aladhan resolve the zone from lat/lon, so a wrong/stale tz param can't
  // shift the prayer times around the clock. Adopt the resolved zone for "now" so the day-rollover
  // and the countdown match the location, not the viewer's device.
  const u=`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${enc(lat)}&longitude=${enc(lon)}&method=${enc(method)}&school=${enc(school)}`;
  let err;
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
      const j=await r.json();
      if(j&&j.data&&j.data.timings){ if(j.data.meta&&j.data.meta.timezone) tz=j.data.meta.timezone; return j.data; }
      throw new Error("bad api");
    }catch(e){ err=e; if(i<2) await sleep(900*(i+1)); }
  }

// ---- weather (Open-Meteo: free, no key, CORS-enabled) -------------------
let weather=null, lastWxAt=0, lastWxTry=0, wxBusy=false;
// HOURLY FORECAST TRACK (Open-Meteo). One fetch pulls `current=` (real-time mood) AND `hourly=` (a 3-day
// forecast). In sim/fast-forward, `weather` is INTERPOLATED from this track by simTime (wxAt) so a sped-up
// clock shows a coherent future weather cycle, not frozen current weather under a moving sun.
let weatherTrack=null;   // {ep:[epoch…], temperature_2m:[…], cloud_cover:[…], weather_code:[…], …}
let siteElev=0;          // surface elevation (m), from the Open-Meteo response — high, thin-air sites read sharper/darker
const wxKey = "salahwx:"+[lat,lon,units].join("|");
function loadWx(){
  try{ const j=JSON.parse(localStorage.getItem(wxKey)); if(j && Date.now()-j.ts < 6*3600e3){ weather=j.w; lastWxAt=j.ts; } }catch(e){}
}
async function fetchWeather(){
  if(SIM.wx!=null) return;                 // simulated weather: never overwrite
  if(!lat||!lon||wxBusy) return;
  const now=Date.now();
  if(weather && weatherTrack && now-lastWxAt < 15*60*1000) return;   // need the hourly TRACK too — a fresh current-weather cache must not block timeScale demos
  if(now-lastWxTry < 60*1000) return;
  lastWxTry=now; wxBusy=true;
  const HRLY="temperature_2m,apparent_temperature,relative_humidity_2m,dew_point_2m,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,weather_code,visibility,is_day";
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${enc(lat)}&longitude=${enc(lon)}&current=temperature_2m,apparent_temperature,relative_humidity_2m,dew_point_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,is_day,weather_code,precipitation,rain,showers,snowfall&hourly=${HRLY}&forecast_days=3&temperature_unit=${units==="c"?"celsius":"fahrenheit"}&wind_speed_unit=ms&timezone=${enc(tz)}`;
  try{
    const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
    const j=await r.json();
    if(j&&j.elevation!=null) siteElev=+j.elevation;                  // Open-Meteo returns the grid-cell elevation
    if(j&&j.current&&j.current.weather_code!=null){
      const cu=j.current;
      weather={code:cu.weather_code, temp:Math.round(cu.temperature_2m),
        feels:cu.apparent_temperature, rh:cu.relative_humidity_2m, dew:cu.dew_point_2m,
        wind:cu.wind_speed_10m, windDir:cu.wind_direction_10m, gust:cu.wind_gusts_10m,
        cloud:cu.cloud_cover, cloudLow:cu.cloud_cover_low, cloudMid:cu.cloud_cover_mid, cloudHigh:cu.cloud_cover_high,
        precip:cu.precipitation, rain:cu.rain, showers:cu.showers, snow:cu.snowfall,   // OBSERVED current/nowcast precip (mm) — the evidence the precip/thunder gate requires
        vis:cu.visibility, isDay:cu.is_day, src:"current"};
      lastWxAt=Date.now();
      try{ localStorage.setItem(wxKey,JSON.stringify({w:weather,ts:lastWxAt})); }catch(e){}
    }
    if(j&&j.hourly&&Array.isArray(j.hourly.time)&&j.hourly.time.length){
      const h=j.hourly, T={ep:h.time.map(s=>{ const m=/^(\d+)-(\d+)-(\d+)T(\d+):(\d+)/.exec(s); return m?epochForTzTime(+m[1],+m[2],+m[3],+m[4],+m[5]):NaN; })};
      for(const k of HRLY.split(",")) T[k]=h[k]||[];
      weatherTrack=T;
    }
  }catch(e){}
  finally{ wxBusy=false; }
}
// linear-interpolate the forecast track at an arbitrary epoch (numeric fields lerp; wind direction via
// unit-vectors so it wraps; weather_code is stepped — codes are categorical, not interpolable). Returns a
// `weather`-shaped object, or null if there's no track. Clamps to the track's range (holds the endpoint).
function wxAt(ms){
  const T=weatherTrack; if(!T||!T.ep||!T.ep.length) return null;
  let i=0; while(i<T.ep.length-1 && T.ep[i+1]<=ms) i++;
  const i0=i, i1=Math.min(T.ep.length-1,i+1), span=(T.ep[i1]-T.ep[i0])||1, f=clamp((ms-T.ep[i0])/span);
  const lp=k=>{ const A=T[k]||[], a=A[i0], b=A[i1]; return a==null?b:(b==null?a:a+(b-a)*f); };
  const d0=(T.wind_direction_10m[i0]||0)*Math.PI/180, d1=(T.wind_direction_10m[i1]||0)*Math.PI/180;
  const wdir=(Math.atan2((1-f)*Math.sin(d0)+f*Math.sin(d1),(1-f)*Math.cos(d0)+f*Math.cos(d1))*180/Math.PI+360)%360;
  return { code:(T.weather_code[f<0.5?i0:i1]), temp:Math.round(lp("temperature_2m")), feels:lp("apparent_temperature"),
    rh:lp("relative_humidity_2m"), dew:lp("dew_point_2m"), wind:lp("wind_speed_10m"), windDir:wdir, gust:lp("wind_gusts_10m"),
    cloud:lp("cloud_cover"), cloudLow:lp("cloud_cover_low"), cloudMid:lp("cloud_cover_mid"), cloudHigh:lp("cloud_cover_high"),
    precip:lp("precipitation"), vis:lp("visibility"), isDay:(lp("is_day")>=0.5?1:0) };
}
// in sim/fast-forward, derive `weather` from the forecast track by simTime (so weather evolves with the
// sped-up clock). Explicit simWx always wins; real-time keeps the `current=` block. No track → hold state.
function syncWeather(){
  if(SIM.wx!=null || !weatherTrack) return;                   // explicit sim weather wins; no track → hold last fetch
  // TRUTHFULNESS: only a FAST-FORWARD/sim preview (ADVANCING) may derive `weather` from the hourly FORECAST track.
  // In normal REAL-TIME we must NEVER overwrite the `current=` OBSERVED/nowcast weather with a forecast — a forecast
  // rain/thunder code must not be presented as "currently raining/storming". Real drift comes from the 15-min
  // current refetch (fetchWeather), which is observed, not projected.
  if(!ADVANCING) return;
  const w=wxAt(simNow()); if(w){ if(w.code!=null) weather=w; w.src="forecast"; }

// normalise the current weather into 0..1 physical drivers (heat/cold/wind/humidity/cloud/haze)
function wxDrivers(){
  const r=(x,a,b)=>clamp((x-a)/(b-a));
  if(!weather) return {heat:0,cold:0,wind:0,gust:0,windX:-0.7,humid:0,rh:0.5,cloud:0,haze:0};
  const toC=v=> v==null?null : (units==="f"?(v-32)*5/9:v);
  const feelsC=toC(weather.feels!=null?weather.feels:weather.temp);
  const dewC=toC(weather.dew);
  return {
    heat: feelsC==null?0:r(feelsC,27,40),                 // 0 below 27°C → 1 at 40°C  (≈80→104°F)
    cold: feelsC==null?0:r(feelsC,8,-8),                  // 0 above 8°C → 1 at −8°C
    wind: r(weather.wind||0,0.5,14),                      // calm → gale (m/s)
    gust: r((weather.gust||0)-(weather.wind||0),2,16),
    windX: -Math.sin((weather.windDir!=null?weather.windDir:225)*Math.PI/180),  // +1 ⇒ wind FROM the west ⇒ clouds drift east
    humid: dewC==null?0:r(dewC,8,22),                     // mugginess via dew point
    rh: (weather.rh!=null?weather.rh:50)/100,
    cloud: (weather.cloud!=null?weather.cloud:0)/100,

}
function wxInfo(code, day){
  const c=code;
  if(c==null||c===0)   return {cond:"clear",   icon:day?"☀️":"🌙", label:day?"Clear":"Clear night"};
  if(c===1||c===2)     return {cond:"cloud",   icon:day?"⛅":"☁️", label:"Partly cloudy"};
  if(c===3)            return {cond:"cloud",   icon:"☁️",  label:"Overcast"};
  if(c===45||c===48)   return {cond:"fog",     icon:"🌫️", label:"Fog"};
  if(c>=51&&c<=57)     return {cond:"rain",    icon:"🌦️", label:"Drizzle"};
  if(c>=61&&c<=67)     return {cond:"rain",    icon:"🌧️", label:"Rain"};
  if(c>=71&&c<=77)     return {cond:"snow",    icon:"🌨️", label:"Snow"};
  if(c>=80&&c<=82)     return {cond:"rain",    icon:"🌦️", label:"Showers"};
  if(c===85||c===86)   return {cond:"snow",    icon:"🌨️", label:"Snow showers"};
  if(c>=95)            return {cond:"thunder", icon:"⛈️", label:"Thunderstorm"};

}

// drive the cinematic moon's rising/setting path. H<0 = east/rising, H=0 = transit (highest), H>0 = west/setting.
function moonAltAz(date, latDeg, lonDeg){
  const lw=_RAD*-lonDeg, ph=_RAD*latDeg, d=_toDays(date), c=_moonCoords(d);

// ---- moon phase (synodic) ------------------------------------------------
function moonPhase(date){
  const synodic=29.530588853;
  const ref=Date.UTC(2000,0,6,18,14,0)/86400000;        // known new moon
  const now=date.getTime()/86400000;
  const phase=(((now-ref)%synodic)+synodic)%synodic/synodic;   // 0 new .. .5 full .. 1 new
  const frac=(1-Math.cos(2*Math.PI*phase))/2;            // illuminated fraction
  return {phase, frac, waxing:phase<0.5};
}

    // whole disc so refl≈1 flat to the limb: a broad, bright, rim-consistent full moon with NO dark-limb halo.
    // At crescent it falls to a real terminator. muG = N·V (viewer at +z), mu0G = N·L (Ly=0).

    // side is always faint TEXTURED terrain (albedo a) — never a flat black cutout, even at gibbous. Stays faint
    // near full (where bright-limb glare dominates) since it's only a small constant lift.
    const lit=a*refl, earth=es*a;   // es already carries the all-phase floor; multiply by albedo so the ashen side stays TEXTURED terrain

// PROJECTED STARFIELD: a fixed synthetic CATALOG on the celestial sphere (the sky is universal), projected to
// the local dome by sidereal time + latitude every tick. So different LOCATIONS see different stars (the zenith
// declination = latitude → Madinah vs Reykjavik overhead skies differ), the sky ROTATES under simTime/timeScale
// (stars rise east, transit, set west), brightness follows a magnitude cascade + horizon EXTINCTION, and
// scintillation rises toward the horizon. ?seed= varies the synthetic draw. NOT a fixed screen wallpaper.
function _mb32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let _starCat=null, _starEls=[], _starsProjected=false, _brightIdx=[], _glintEls=[];
const _SKYX=162, _SKYY=-30, _SKYR=270, _SKYK=0.8;            // azimuthal-equidistant dome anchor (zenith above card)
function projectStars(date){
  if(!_starCat||!_starEls.length) return;
  const d=_toDays(date), lst=_sid(d,_RAD*-(+lon||0)), ph=_RAD*(+lat||0), sp=Math.sin(ph), cp=Math.cos(ph);
  // a bright, above-horizon moon WASHES OUT the stars around it (its glow out-shines its neighbourhood)
  const mw=(moonSky&&moonSky.up!=null)?clamp(moonSky.frac*moonSky.up*1.15):0;
  const mx=(moonSky&&moonSky.sx!=null)?moonSky.sx*325:1e4, my=(moonSky&&moonSky.sy!=null)?moonSky.sy*530:1e4;
  for(let i=0;i<_starCat.length;i++){
    const s=_starCat[i], el=_starEls[i]; if(!el) continue;
    const H=lst-s.ra, cH=Math.cos(H), sH=Math.sin(H);
    const sinAlt=sp*s.sd+cp*s.cd*cH, altDeg=Math.asin(sinAlt)/_RAD;
    if(altDeg<-1){ if(el.style.display!=="none") el.style.display="none"; continue; }
    const az=Math.atan2(sH, cH*sp-(s.sd/s.cd)*cp);
    const r=(90-altDeg)/90*_SKYR, x=_SKYX+r*Math.sin(az), y=_SKYY-r*Math.cos(az)*_SKYK;
    if(x<-24||x>349||y<-24||y>250){ if(el.style.display!=="none") el.style.display="none"; continue; }
    // atmospheric EXTINCTION via Rozenberg airmass X (finite at the horizon): transparency = 10^(−0.4·k·X), k≈0.2.
    const X=1/(Math.max(0.02,sinAlt)+0.025*Math.exp(-11*Math.max(0,sinAlt))), ext=Math.pow(10,-0.08*X);
    let o=(0.10+1.05*s.b*ext); if(o>1)o=1;   // brighter, higher-contrast field (was a dim background)
    if(mw>0.12){ const dr=Math.hypot(x-mx,y-my); o*=(1-0.92*mw*Math.max(0,1-dr/175)); if(dr<58) o*=0.10; }   // dim stars near a bright moon; fully crush them inside the inner glow
    el.style.display=""; el.setAttribute("cx",x.toFixed(1)); el.setAttribute("cy",y.toFixed(1));

  upBright.sort((a,b)=>(+_starCat[b].b)-(+_starCat[a].b));

    const el=_starEls[i], sz=0.6+1.15*(+_starCat[i].b), op=(+el.style.opacity||0)*0.8;
    g.style.display=""; g.setAttribute("transform",`translate(${el.getAttribute("cx")} ${el.getAttribute("cy")}) scale(${sz.toFixed(2)})`);

}
function buildStars(){

    for(let i=0;i<150;i++){
      const t=rnd(i,1.73), gp=(rnd(i,4.31)+rnd(i,9.81)+rnd(i,2.27)-1.5)*22;
      const px=(30+t*252)+nx*gp, py=(258-t*206)+ny*gp;

      mw+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${(0.35+0.55*rnd(i,7.7)).toFixed(2)}" fill="#dde4f5" opacity="${(0.08+0.20*rnd(i,6.13)).toFixed(2)}"/>`;
    }

  }
  // ---- synthetic catalog: STAR FAMILIES. A wide, fixed dynamic range — a few RARE bright luminaries (mag<0,
  //   blue / white / amber, with a halo + glint) read as anchors over a LARGE faint dust bed (→ mag 6.3), so the
  //   field never looks like one uniform rotating wallpaper. Colour temperature spans O/B blue → K/M amber/red. ----
  const COL=["#9db4ff","#bcd0ff","#dbe6ff","#f4f4ff","#fff6e8","#ffe2bf","#ffc89a","#ff9d7a"];
  const CW =[ .04,.10,.24,.30,.16,.09,.05,.02 ]; const cdf=[]; let acc=0; for(const w of CW){ acc+=w; cdf.push(acc); }
  const rng=_mb32((0x9e3779b9 ^ Math.imul((+q.get("seed")||1),2654435761))>>>0);
  const N=420; _starCat=[]; let s="";
  for(let i=0;i<N;i++){
    const ra=rng()*Math.PI*2, dec=Math.asin(2*rng()-1);                 // uniform over the sphere
    const mag=-1.3+7.6*Math.pow(rng(),0.52);                            // a few very bright (mag<0) over a large faint bed (→+6.3)

    if(bright){ const BC=["#a8c4ff","#e6efff","#fff0cf","#ffce98","#ffb6a6"]; fill=BC[(rng()*BC.length)|0]; }   // vivid, distinct luminary hues (blue / white / amber / red)
    const tw= rng()>0.4, dur=(1.6+3.8*rng()).toFixed(1), del=(-rng()*6).toFixed(1);

// build everything render() needs, in tz minutes
function model(){
  const n=nowParts(), nowMin=n.h*60+n.mi+n.s/60, t=today.timings;
  const noon=mins(t.Dhuhr), start=noon-720;
  const norm=x=>{ while(x<start)x+=1440; while(x>=start+1440)x-=1440; return x; };
  // sort the six waypoints by time-of-day so "next"/"current" stay correct even if the timings
  // aren't in the usual Fajr→Isha order (e.g. a mis-set time zone shifts them around the clock).
  const list=prayers.map(k=>({k,m:mins(t[k]),t:t[k]})).sort((a,b)=>a.m-b.m);
  const i=list.findIndex(x=>x.m>nowMin);
  let next, nextMin, prevMin, tomorrowFlag;
  if(i>=0){ next=list[i]; nextMin=next.m; prevMin=i>0?list[i-1].m:list[list.length-1].m-1440; tomorrowFlag=false; }
  else { const ft=tomorrow?tomorrow.timings.Fajr:t.Fajr; next={k:"Fajr",t:ft,m:mins(ft)}; nextMin=mins(ft)+1440; prevMin=list[list.length-1].m; tomorrowFlag=true; }
  const passed=list.filter(x=>x.m<=nowMin); let cur=passed.length?passed[passed.length-1].k:"Isha";
  // "Sunrise" only lingers 20 min; the rest of the morning (until Dhuhr) is "Forenoon"
  if(cur==="Sunrise" && nowMin >= mins(t.Sunrise)+20) cur="Forenoon";
  const doy=Math.floor((Date.UTC(n.y,n.mo-1,n.d)-Date.UTC(n.y,0,0))/86400000);
  const decl=23.44*Math.PI/180*Math.sin(2*Math.PI*(doy-80)/365.25);   // solar declination (rad), from the date
  return {
    t, noon, decl, sunrise:norm(mins(t.Sunrise)), sunset:norm(mins(t.Sunset||t.Maghrib)),
    nowMin, nowAbs:norm(nowMin), warmEnd: tomorrowFlag ? start+1440 : norm(next.m),
    dots: prayers.map(k=>({k, abs:norm(mins(t[k]))})),
    currentKey:cur, nextKey:next.k, nextTime:next.t,
    leftMin:nextMin-nowMin, progress:clamp((nowMin-prevMin)/(nextMin-prevMin)),

}

// draw the solar-prayer arc

  // prayer-to-prayer relationships. Prayer events are SAMPLED onto it. POLAR days (Aladhan returns a
  // degenerate Sunrise≈Sunset) only pick the transit as Dhuhr (avoids /0 in the declination refinement).
  const dayLen=M.sunset-M.sunrise, polar=dayLen<30||dayLen>1410;
  const noonT=polar?M.noon:(M.sunrise+M.sunset)/2;            // solar transit — true hour angle H=0 here, no warp
  // Declination refined from the day's OWN length so elevation crosses 0° exactly at this date's
  // sunrise/sunset (a solar calibration, not a prayer relation). The apex falls at the true transit
  // (smooth, zero-slope); the real Dhuhr time then lands just past it naturally.
  const DEG=Math.PI/180, phi=(+(q.get("lat"))||0)*DEG;
  let decl=M.decl;
  const HsrDeg=((M.sunset-M.sunrise)/2)*0.25, tp=Math.tan(phi);
  if(!polar && Math.abs(tp)>0.05){ const d=Math.atan(-Math.cos(HsrDeg*DEG)/tp);
    if(isFinite(d)&&Math.abs(d)<27.5*DEG) decl=d; }   // 27.5° admits the near-solstice fit (the fit slightly exceeds the real 23.4° because it absorbs refraction so the curve crosses 0° EXACTLY at this date's sunrise/sunset → those dots land ON the dashed line)
  const Hof=a=>(a-noonT)*0.25;                                // TRUE hour angle (deg): 0.25°/min, smooth (C∞)
  const cl=x=>x<-1?-1:x>1?1:x;
  const elevDeg=a=>Math.asin(cl(Math.sin(phi)*Math.sin(decl)+Math.cos(phi)*Math.cos(decl)*Math.cos(Hof(a)*DEG)))/DEG;
  // elevation → y, FILLING the frame (apex→Ad above the dashed horizon, deepest night→−An below it) with
  // a C¹ join at 0°: a piecewise day/night tanh whose first derivatives MATCH at the horizon, so there is
  // no slope kink where the curve crosses the dashed line. Sn is solved so the night slope equals the day slope.
  const S=42, maxRealE=elevDeg(noonT);
  const minRealE=Math.min(elevDeg(start), elevDeg(start+1440), elevDeg(noonT+720), elevDeg(noonT-720));
  const crosses = maxRealE>0 && minRealE<0;                   // does the sun actually cross the horizon?
  let ALT;
  if(crosses){
    // NORMAL / shallow-night days: the night side shares the day's HORIZON SLOPE m (C¹ — no kink where
    // the curve crosses the dashed 0° line). A DEEP night is compressed (solve Sn) to fill exactly to −An;
    // a SHALLOW high-latitude-summer night dips honestly at the matched slope (no fake fill, no kink).
    const maxE=maxRealE, aE=-minRealE, dayK=Math.tanh(maxE/S), m=Ad/(S*dayK);
    const Dn=m*S*Math.tanh(aE/S);                             // natural depth of a matched-slope night
    let nightFn;
    if(Dn>=An && aE>=0.5){
      const target=An/m; let lo=1e-3, hi=aE*4;                // solve Sn·tanh(aE/Sn)=An/m  (monotone → bisection)
      for(let k=0;k<60;k++){ const mid=(lo+hi)/2; if(mid*Math.tanh(aE/mid)<target) lo=mid; else hi=mid; }
      const Sn=(lo+hi)/2, nightK=Math.tanh(aE/Sn);
      nightFn = e => An*Math.tanh(e/Sn)/nightK;               // fills to −An at minE, slope m at the horizon
    } else nightFn = e => m*S*Math.tanh(e/S);                 // honest shallow dip, slope m at the horizon
    ALT = a => { const e=elevDeg(a); return e>=0 ? Ad*Math.tanh(e/S)/dayK : nightFn(e); };
  } else {
    // POLAR days (no horizon crossing): the dashed 0° line sits entirely above (polar night) or below
    // (midnight sun) the whole curve. There is no crossing to match a slope at, so normalise the curve's
    // OWN elevation range to fill its half-frame — smooth, single-branch, truthful (the horizon stays off it).
    const Sn=S*An/Ad, maxE=Math.max(3,maxRealE), maxD=Math.max(3,-minRealE);
    const dayK=Math.tanh(maxE/S), nightK=Math.tanh(maxD/Sn);

  }
  const Y=a=>hY-ALT(a);
  // ONE ordered sample array across the displayed span → ONE smooth path string `d` (the single source of
  // truth for every layer). `now` is inserted as an explicit vertex so the ring + active reveal land
  // EXACTLY on the path. cum[] = cumulative chord length (a polyline's length is its chord sum exactly).
  const STEP=4, ts=[];
  for(let a=start; a<start+1440+1e-6; a+=STEP) ts.push(a);
  const nowAbs=M.nowAbs;
  if(nowAbs>start+0.01 && nowAbs<start+1440-0.01){ const j=ts.findIndex(v=>v>nowAbs);
    if(j>0 && Math.abs(ts[j]-nowAbs)>0.01 && Math.abs(ts[j-1]-nowAbs)>0.01) ts.splice(j,0,nowAbs); }
  const pts=ts.map(a=>({a,x:X(a),y:Y(a)}));
  // VISIBLE path = ONE smooth Catmull-Rom → cubic-Bézier curve THROUGH every physical sample (interpolating,
  // C¹ — not a polyline of L-segments). Every knot (incl. the inserted `now` vertex and the prayer-marker
  // anchors) lies ON the curve by construction. cum[] = the TRUE spline arc length (4 sub-chords per segment)
  // so the dash-reveal and the eye-of-needle ring land exactly where the rendered curve is.
  const n=pts.length, P=i=>pts[i<0?0:i>n-1?n-1:i];

        by=mt*mt*mt*p1.y+3*mt*mt*t*b1y+3*mt*t*t*b2y+t*t*t*p2.y;

  const Lnow=cum[iNow];
  // prayer markers placed ONTO the path via the same X/Y closures (on the curve by construction — sampled
  // onto it, never inserted into the polyline so they can't kink it).
  // Fajr/Isha are method-ESTIMATED (not true twilight crossings) when the sun never reaches their depression
  // angle — shallow high-latitude nights. Mark those two dots subtly as "adjusted" (hollow ring) so the curve
  // doesn't imply a false physical crossing.
  const estimated = minRealE > -14;
  let dots="";
  for(const p of M.dots){
    const adj = estimated && (p.k==="Fajr"||p.k==="Isha");
    const ring = (p.k==="Sunrise");   // Sunrise is an astronomical event, NOT a prayer → a hollow ring, not a filled dot
    // Dhuhr begins just AFTER zawāl (the sun passing the meridian); it is NOT solar noon. The apex IS solar noon,
    // so Dhuhr's dot must sit a hair PAST the apex, never on it. If its minute-rounded time collapsed onto the
    // apex, hold it the minimum hair past; if it's genuinely later, its own time already places it further along.
    const pabs = (p.k==="Dhuhr") ? Math.max(p.abs, noonT + 11) : p.abs;
    const cls = (p.k===M.nextKey ? "dot next" : "dot") + (adj?" adj":"") + (ring?" ring":"");
    dots+=`<circle class="${cls}" cx="${X(pabs).toFixed(2)}" cy="${Y(pabs).toFixed(2)}" r="${R}"/>`;
  }
  // "eye of a needle": the ring centre + tangent come from the SAME sample at iNow — pts[iNow] IS the
  // point at path-length Lnow, so the ring threads the one path with zero divergence. The grey rail
  // threads through (one half behind, one half in front); the dash-revealed active arc draws over the
  // whole ring so the live light reads as sitting ON TOP of the marker.
  const cx=pts[iNow].x, cy=pts[iNow].y, r=8;
  const iP=Math.max(0,iNow-1), iN=Math.min(pts.length-1,iNow+1);
  let dxr=pts[iN].x-pts[iP].x, dyr=pts[iN].y-pts[iP].y;
  if(Math.hypot(dxr,dyr)<1e-6){ dxr=1; dyr=0; }
  const th=Math.atan2(dyr,dxr), ux=Math.cos(th)*r, uy=Math.sin(th)*r;
  const p1=`${(cx+ux).toFixed(2)} ${(cy+uy).toFixed(2)}`, p2=`${(cx-ux).toFixed(2)} ${(cy-uy).toFixed(2)}`;
  const eyeBack =`<path class="cur" d="M${p1} A${r} ${r} 0 0 0 ${p2}"/>`;
  const eyeFront=`<path class="cur" d="M${p1} A${r} ${r} 0 0 1 ${p2}"/>`;
  // active/glow = the SAME path `d`, revealed by a stroke-dash from the start up to `now` — NOT a second
  // path. The round linecap extends the lit tip ½ stroke-width (1.6px) past the dash, so the visible tip
  // lands exactly on the ring at Lnow.
  const reveal=`stroke-dasharray="${(Lnow+1.6).toFixed(2)} ${(totalLen-Lnow+10).toFixed(2)}"`;
  return `<line class="horizon" x1="${PAD}" y1="${hY}" x2="${W-PAD}" y2="${hY}"/>`+
         `<path class="railsh" d="${d}"/>`+eyeBack+
         `<path class="rail" d="${d}"/>`+eyeFront+
         `<path class="warmsh" d="${d}" ${reveal}/><path class="warm" d="${d}" ${reveal}/><path class="warmcore" d="${d}" ${reveal}/>`+
         `${dots}`;
}

// ---- continuous time-of-day sky -----------------------------------------
const lerp =(a,b,t)=>a+(b-a)*t;
const mixRGB=(A,T,s)=>[lerp(A[0],T[0],s),lerp(A[1],T[1],s),lerp(A[2],T[2],s)];
const rgb  =a=>`rgb(${Math.round(a[0])},${Math.round(a[1])},${Math.round(a[2])})`;
const rgba =a=>`rgba(${Math.round(a[0])},${Math.round(a[1])},${Math.round(a[2])},${(+a[3]).toFixed(3)})`;

// QUARANTINED: the old named-keyframe palette (`KF` + `paletteAt`) was REMOVED on purpose.
// Sky colour is NOT keyed to a prayer name → palette anymore. The single source of truth is
// physSky() below — solar ELEVATION drives luminance and the reference colours there are
// tone-mapping OUTPUTS only. Do not reintroduce a name→palette lookup as the source of truth.
// REAL solar altitude in degrees at absolute-minute a — same prayer-anchored hour-angle model the arc
// uses (declination from the date, refined so altitude hits 0 at the day's own sunrise/sunset; the peak
// lands at zawāl). Sim-aware (a = M.nowAbs follows SIM.time). This drives the twilight physics so the
// Belt of Venus, glow reddening, and nightness key off genuine degrees, not a hand-tuned sinusoid.
function sunAltAt(M,a){
  // MUST match drawArc's elevation exactly (true hour angle, same declination refinement) so the sky
  // physics and the arc never drift — sunrise glow must fire when the arc's sunrise dot is on the horizon.
  const DEG=Math.PI/180, phi=(+(q.get("lat"))||0)*DEG;
  const dayLen=M.sunset-M.sunrise, polar=dayLen<30||dayLen>1410;
  const noonT=polar?M.noon:(M.sunrise+M.sunset)/2;
  let decl=M.decl;
  const HsrDeg=((M.sunset-M.sunrise)/2)*0.25, tp=Math.tan(phi);
  if(!polar && Math.abs(tp)>0.05){ const d=Math.atan(-Math.cos(HsrDeg*DEG)/tp); if(isFinite(d)&&Math.abs(d)<24*DEG) decl=d; }
  const Hof=(a-noonT)*0.25;                                   // TRUE hour angle, no warp (matches drawArc)
  const cl=x=>x<-1?-1:x>1?1:x;

function sunMetrics(M){
  const start=M.noon-720, a=M.nowAbs;

  const altN=Math.max(-1,Math.min(1,altDeg/46));       // normalised for screen-y placement only
  return { x:6+(a-start)/1440*88, y:60-Math.max(0,altN)*44, altN, altDeg };
}

// ---- PHYSICAL SKY (the source of truth) ----------------------------------------------------------------
// Solar ELEVATION drives everything. The sky's clear-air luminance falls through the real twilight zones —
// day → civil (−6°) → nautical (−12°) → astronomical (−18°) → night — so the true dawn (Fajr, the method's
// ~−15..−18° depression) is genuinely DARK (a faint line on the horizon), and brightness only emerges as
// the sun climbs toward civil twilight and sunrise. Reference colours below are tone-mapping OUTPUTS, not a
// named-keyframe source of truth.
const _ss=t=>{ t=t<0?0:t>1?1:t; return t*t*(3-2*t); };
function skyLum(e){                                     // clear-sky luminance 0 (night) → 1 (day)
  if(e>=6)   return 1;
  if(e>=0)   return 0.60+0.40*_ss(e/6);                 // day band   0..+6°
  if(e>=-6)  return 0.20+0.40*_ss((e+6)/6);             // civil      −6..0°
  if(e>=-12) return 0.055+0.145*_ss((e+12)/6);          // nautical   −12..−6°
  if(e>=-18) return 0.055*_ss((e+18)/6);                // astronomical −18..−12°
  return 0;                                             // night
}
function physSky(M, sm){
  const e=sm.altDeg;
  const lum=skyLum(e);                                  // overall sky brightness from solar elevation
  const warm=clamp((e+12)/11)*(1-clamp((e-1)/9));       // warm horizon glow: nautical → just-below → gone high in day
  // reference colours: clear-day Rayleigh (deep zenith→pale horizon), moonless night, sunrise/sunset warm
  const dayZen=[34,100,176],dayMid=[70,136,196],dayHor=[150,184,212];
  const nitZen=[10,15,38],  nitMid=[10,14,33],  nitHor=[15,21,48];
  const warmHor=[255,150,80],warmMid=[206,116,116];
  let g1=mixRGB(nitZen,dayZen,lum), g2=mixRGB(nitMid,dayMid,lum), g3=mixRGB(nitHor,dayHor,lum);
  g3=mixRGB(g3,warmHor,warm*0.66); g2=mixRGB(g2,warmMid,warm*0.26); g1=mixRGB(g1,warmMid,warm*0.06);
  // sun bloom: warm-white high, reddening toward the horizon (airmass), gone below the horizon

  const stars=clamp((0.26-lum)/0.24);                   // stars emerge as the sky darkens (astronomical → night)
  const sunhue=_ss(clamp((e+4)/10));                    // 0 night → 1 day, for the accent warm/cool
  return {
    g1,g2,g3,
    glow:[glowCol[0],glowCol[1],glowCol[2],glowA],
    hor:[horCol[0],horCol[1],horCol[2],horA],
    stars,
    accent:mixRGB([214,220,236],[255,226,150],sunhue),
    accent2:mixRGB([168,176,208],[243,196,104],sunhue),
    text:mixRGB([240,237,248],[246,242,236],warm*0.5),

}


// ---- weather → sky modifier + effect class ------------------------------
// PRECIP/THUNDER GATE — a precipitation or thunderstorm WEATHER CODE is only honoured when there is ACTIVE
// observed precipitation EVIDENCE (current/nowcast precip amount, mm). Open-Meteo's current weather_code is a
// model nowcast that can over-call rain/thunder; without corroborating precip we DOWNGRADE to the cloud state
// implied by the observed cloud cover, so the widget never claims "Rain"/"Thunderstorm" (or animates rain/

// ---- CLOUD ENGINE: an evolving density field on a small canvas (NOT a static texture being scrolled) ----
// The old SVG feTurbulence deck was a FROZEN noise field advected by translateX — it read as a sliding photo
// with tile seams. This replaces it with multi-octave 3D value-noise FBM whose THIRD axis is TIME: the field
// MORPHS in place (clouds form/erode) while wind ADVECTS it in x/y. Together = live cloud, no scroll, no seam.
// Coverage (low/mid/high, from the forecast) thresholds each deck. The buffer is tiny (72×118) and CSS-upscaled
// + blurred, so it's cheap; a clear sky paints nothing. Time = simNow(), so fast-forward speeds cloud evolution.
const _h3=(x,y,z)=>{ let n=Math.imul((x|0),374761393)+Math.imul((y|0),668265263)+Math.imul((z|0),1274126177); n=Math.imul(n^(n>>>13),1274126177); return ((n^(n>>>16))>>>0)/4294967295; };

// driven LIFECYCLE (grows in / erodes out, no popping) that ADVECTS with the wind; coverage controls how many

  const decks=[

    [S.covMid, 26, 0.135, 0.05, S.tMid, 0.9, 4.7+_cs,  6],   // mid deck — above it

//   (2) lighting variables — sky luminance, horizon glow, moonlight, cloud underlight, wetness

// (the arc is narrower on short days, wider on long ones — so we fit per day, not a fixed size) and

let _cnFit="";

  const key=M.currentKey+"|"+Math.round(M.sunrise)+"|"+Math.round(M.sunset);
  if(key===_cnFit) return;
  const Mu=16, gap=Mu/2;
  const box=el=>{ const r=document.createRange(); r.selectNodeContents(el); return r.getBoundingClientRect(); };
  cn.style.fontSize="30px";

function _midDisp(x0,y0,x1,y1,disp,depth,rnd,out){

  if(SIM.wx!=null){
    const sTemp=SIM.temp!=null?+SIM.temp:72, sRh=SIM.humid!=null?+SIM.humid:45;
    const tC=units==="f"?(sTemp-32)*5/9:sTemp, dC=tC-(100-Math.max(1,Math.min(100,sRh)))/5;   // derive dew point from temp+RH (Magnus approx) so simHumid drives the dew-point haze/blur
    // default a code-appropriate observed precip so a bare simWx still shows its precip visuals; simPrecip overrides
    // it (e.g. simWx=95&simPrecip=0 → a "forecast thunder but dry" case the gate must downgrade).
    const sCls=wxClass(+SIM.wx), defP=(sCls==="thunder")?5:(sCls==="rain")?2:(sCls==="drizzle")?0.3:(sCls==="snow")?1:0;
    weather={code:+SIM.wx, temp: sTemp,
      feels: SIM.feels!=null?+SIM.feels:sTemp, rh: sRh, dew: units==="f"?dC*9/5+32:dC,
      wind: SIM.wind!=null?+SIM.wind:3, windDir: SIM.windDir!=null?+SIM.windDir:225,
      gust: (SIM.wind!=null?+SIM.wind:3)+2, cloud: SIM.cloud!=null?+SIM.cloud:0, precip: SIM.precip!=null?+SIM.precip:defP,
      vis: SIM.humid!=null&&+SIM.humid>92?2000:20000, isDay:1, src:"sim"};
  }
  fetchWeather();
  const ds=nowParts().dateStr;
  const cached=loadCache(ds);
  if(cached){ today=cached; if(cached.meta&&cached.meta.timezone) tz=cached.meta.timezone; lastDate=ds; render(); }
  try{
    today=await fetchTimings(ds);
    saveCache(ds,today);
    lastDate=ds;
    render();
  }catch(e){
    if(!today) showError("Could not load prayer times");
  }
  // SINGLE rAF render clock. Renders on each sim-second (≈1 Hz at timeScale 1; up to per-frame when fast),
  // so the marker, sky, prayer state and moon all advance from simTime. Decorative weather motion lives in
  // CSS (wind/precip-driven), independent of this clock. Stops entirely when the iframe is hidden/offscreen.
  const cEl=document.querySelector(".c");
  let _raf=null, _onScreen=true, _lastSec=-1, _lastDateStr=lastDate||"", _lastWx=0, _lastCloud=0;
  const _RM=(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  const visible=()=>_onScreen && document.visibilityState!=="hidden";
  function loop(){
    const n=nowParts();
    if(n.dateStr!==_lastDateStr){                       // crossed (sim) midnight → load that day's timings
      if(_lastDateStr){ tomorrow=null; const ds=n.dateStr, c=loadCache(ds); if(c) today=c;
        fetchTimings(ds).then(d=>{today=d;saveCache(ds,d);}).catch(()=>{}); renderMoon(); _starsProjected=false; }
      _lastDateStr=n.dateStr;
    }
    const rt=_RAFNOW();
    if(!ADVANCING && rt-_lastWx>30000){ _lastWx=rt; fetchWeather(); }    // refresh real weather ~½-min (held during a fast sweep)
    const sec=Math.floor(simNow()/1000);
    if(sec!==_lastSec){ _lastSec=sec; render(); if(ADVANCING) updateSimClock(n); }
    // cloud density field repaints ~13fps so it visibly EVOLVES + drifts (time = simNow, so fast-forward
    // accelerates it). Reduced-motion: paint once per state change with frozen time (no animation).
    if(_RM){ if(_cloudDirty){ paintClouds(1000); tieRainToClouds(); } }
    else if(rt-_lastCloud>76){ _lastCloud=rt; paintClouds(simNow()/1000); tieRainToClouds(); }
    _raf=requestAnimationFrame(loop);
  }
  function start(){ if(!_raf) _raf=requestAnimationFrame(loop); }
  function stop(){ if(_raf){ cancelAnimationFrame(_raf); _raf=null; } }
  function setVis(){ const on=visible(); if(cEl){ cEl.classList.toggle("paused",!on); if(ADVANCING) cEl.classList.add("fast"); } if(on) start(); else stop(); }
  document.addEventListener("visibilitychange",setVis);
  if("IntersectionObserver" in window && cEl)
    new IntersectionObserver(es=>{ _onScreen=es[0].isIntersecting; setVis(); },{threshold:0}).observe(cEl);
  if(ADVANCING){ const sc=document.querySelector(".simclock"); if(sc) sc.style.display="block"; }
  setVis();
}

boot();
</script>
</body>
</html>
