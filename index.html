<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prayer Times</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:transparent}
body{color:#fff7df;font:14px system-ui,-apple-system,Segoe UI,sans-serif}
.c{
  --g1:#102b23;--g2:#071211;--g3:#241507;
  --glow:#7c5b2488;--accent:#f8d878;--accent2:#e8b24a;--text:#fff7df;
  width:325px;height:280px;border-radius:28px;padding:13px 15px;
  background:radial-gradient(circle at 0 0,var(--glow),transparent 40%),linear-gradient(145deg,var(--g1),var(--g2) 70%,var(--g3));
  box-shadow:0 18px 50px #0008;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
  color:var(--text);overflow:hidden;transition:color .5s,border-color .5s}
/* weather + day/night palettes */
.c[data-theme="clearDay"]  {--g1:#1d6a4e;--g2:#0a2a23;--g3:#3a2606;--glow:#ffcf6baa;--accent:#ffdf8e;--accent2:#edb43f;--text:#fff7df}
.c[data-theme="clearNight"]{--g1:#101a3c;--g2:#070b1c;--g3:#171340;--glow:#475ec0aa;--accent:#ecd49a;--accent2:#c9a85f;--text:#eef1ff}
.c[data-theme="cloudDay"]  {--g1:#2c3c3a;--g2:#161f1e;--g3:#23211b;--glow:#aebbb888;--accent:#ecd9a4;--accent2:#cbb578;--text:#f3f5f0}
.c[data-theme="cloudNight"]{--g1:#1b2533;--g2:#0a0f18;--g3:#161820;--glow:#61739480;--accent:#d8c89c;--accent2:#b0a074;--text:#eaedf4}
.c[data-theme="rain"]      {--g1:#16323f;--g2:#0a1a22;--g3:#0e2531;--glow:#5aa0c2aa;--accent:#bfe2f2;--accent2:#6fb6d8;--text:#eaf4fb}
.c[data-theme="snow"]      {--g1:#2a3a45;--g2:#16242c;--g3:#243039;--glow:#cfeaffcc;--accent:#eaf6ff;--accent2:#a9d2ea;--text:#f2f9ff}
.c[data-theme="fog"]       {--g1:#2b3331;--g2:#171c1b;--g3:#202624;--glow:#b8c2c088;--accent:#e2e6e0;--accent2:#aab0aa;--text:#eef1ee}
.c[data-theme="thunder"]   {--g1:#241b3c;--g2:#0c0a1a;--g3:#241228;--glow:#8a6cffaa;--accent:#dac9ff;--accent2:#9d7cff;--text:#efeaff}
.h{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:11px}
.hl{min-width:0;display:flex;align-items:center;gap:9px}
.e{min-width:0;font-size:11px;line-height:1.2;letter-spacing:.16em;text-transform:uppercase;color:color-mix(in srgb,var(--accent) 72%,#fff);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ar{font-size:23px;line-height:1;color:var(--accent);text-shadow:0 0 18px color-mix(in srgb,var(--accent) 40%,transparent);flex:none}
.wx{font-size:13px;line-height:1;color:var(--text);opacity:.92;white-space:nowrap;display:flex;align-items:center;gap:4px;flex:none}
.wx .i{font-size:15px}
.nbox{padding:9px 13px;border-radius:18px;background:#ffffff14;border:1px solid #ffffff22;margin-bottom:8px}
.left{color:color-mix(in srgb,var(--text) 62%,transparent);font-size:12px;line-height:1.25;margin-top:1px}
.nr{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.n{font-size:25px;line-height:1.05;font-weight:950}
.nt{font-size:21px;line-height:1.05;font-weight:850;color:var(--accent)}
.bar{height:6px;border-radius:6px;background:#ffffff1a;margin:8px 0 6px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .9s linear}
.times{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.p{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;border-radius:13px;background:#ffffff10;border:1px solid #ffffff12;transition:opacity .3s,background .3s}
.p.on{background:color-mix(in srgb,var(--accent) 16%,transparent);border-color:color-mix(in srgb,var(--accent) 45%,transparent)}
.p.past{opacity:.42}
b{font-weight:800}
.tm{font-weight:850;font-size:13.5px}
.d{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-top:7px;color:color-mix(in srgb,var(--text) 62%,transparent);font-size:12px;line-height:1.25}
.d span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{opacity:.55;font-size:.82em;margin-left:4px;letter-spacing:.05em}
</style>
</head>
<body>
<div class="c">
  <div class="h">
    <div class="hl"><span class="e" id="loc"></span><span class="wx" id="wx"></span></div>
    <div class="ar">الصلاة</div>
  </div>
  <div class="nbox">
    <div class="nr"><div class="n">—</div><div class="nt">—</div></div>
    <div class="bar"><i></i></div>
    <div class="left">Loading…</div>
  </div>
  <div class="times"></div>
  <div class="d"><span class="ce" id="ce"></span><span class="ah" id="ah"></span></div>
</div>

<script>
"use strict";
// ---- config from URL hash ------------------------------------------------
const q     = new URLSearchParams(location.hash.slice(1));
const lat   = q.get("lat");
const lon   = q.get("lon");
const tz    = q.get("tz")    || "America/New_York";
const label = q.get("label") || "";
const method= q.get("method")|| "2";
const school= q.get("school")|| "0";
const fmt24 = (q.get("time") || "24") !== "12";
const units = (q.get("units") || "f").toLowerCase() === "c" ? "c" : "f";
const datefmt = (q.get("datefmt") || "iso").toLowerCase();

const prayers = ["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
const real    = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

// ---- helpers -------------------------------------------------------------
const $    = s => document.querySelector(s);
const pad  = n => String(n).padStart(2,"0");
const enc  = encodeURIComponent;
const sleep= ms => new Promise(r=>setTimeout(r,ms));
const clean= t => String(t).replace(/\s*\(.+\)\s*/,"").trim();
const mins = t => { const [h,m]=clean(t).split(":").map(Number); return h*60+m; };
const fmt  = t => {
  const [h,m]=clean(t).split(":").map(Number);
  if(fmt24) return `${pad(h)}:${pad(m)}`;
  return `${h%12||12}:${pad(m)} ${h>=12?"PM":"AM"}`;
};
const formatLeft = leftMin => {
  const s=Math.max(0,Math.round(leftMin*60));
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}h ${m}m left`;
  if(m>0) return `${m}m left`;
  return `${sec}s left`;
};
// format an Aladhan {day, month:{number,en}, year} object per the chosen style
const fmtDate = o => {
  if(!o) return "";
  const dd=pad(+o.day), mm=pad(+(o.month&&o.month.number||0)), yyyy=o.year, mon=(o.month&&o.month.en)||"";
  switch(datefmt){
    case "us":   return `${mm}/${dd}/${yyyy}`;
    case "eu":   return `${dd}/${mm}/${yyyy}`;
    case "long": return `${+o.day} ${mon} ${yyyy}`;
    default:     return `${yyyy}-${mm}-${dd}`;   // iso (YYYY-MM-DD)
  }
};

// current wall-clock in the *configured* timezone (not the browser's)
function nowParts(){
  try{
    const f=new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
    const p={}; for(const part of f.formatToParts(new Date())) p[part.type]=part.value;
    return {y:+p.year,mo:+p.month,d:+p.day,h:(+p.hour)%24,mi:+p.minute,s:+p.second,dateStr:`${p.day}-${p.month}-${p.year}`};
  }catch(e){
    const d=new Date();
    return {y:d.getFullYear(),mo:d.getMonth()+1,d:d.getDate(),h:d.getHours(),mi:d.getMinutes(),s:d.getSeconds(),dateStr:`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`};
  }
}
function tomorrowStr(){
  const n=nowParts();
  const d=new Date(Date.UTC(n.y,n.mo-1,n.d));
  d.setUTCDate(d.getUTCDate()+1);
  return `${pad(d.getUTCDate())}-${pad(d.getUTCMonth()+1)}-${d.getUTCFullYear()}`;
}

// ---- data: fetch + cache + retry ----------------------------------------
const cacheKey = "salah:"+[lat,lon,tz,method,school].join("|");
function loadCache(dateStr){
  try{ const j=JSON.parse(localStorage.getItem(cacheKey)); if(j&&j.date===dateStr) return j.data; }catch(e){}
  return null;
}
function saveCache(dateStr,data){
  try{ localStorage.setItem(cacheKey,JSON.stringify({date:dateStr,data})); }catch(e){}
}
async function fetchTimings(dateStr){
  const u=`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${enc(lat)}&longitude=${enc(lon)}&method=${enc(method)}&school=${enc(school)}&timezonestring=${enc(tz)}`;
  let err;
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
      const j=await r.json();
      if(j&&j.data&&j.data.timings) return j.data;
      throw new Error("bad api");
    }catch(e){ err=e; if(i<2) await sleep(900*(i+1)); }
  }
  throw err;
}

// ---- weather (Open-Meteo: free, no key, CORS-enabled) -------------------
let weather=null, lastWxAt=0, lastWxTry=0, wxBusy=false;
const wxKey = "salahwx:"+[lat,lon,units].join("|");
function loadWx(){
  try{ const j=JSON.parse(localStorage.getItem(wxKey)); if(j && Date.now()-j.ts < 6*3600e3){ weather=j.w; lastWxAt=j.ts; } }catch(e){}
}
async function fetchWeather(){
  if(!lat||!lon||wxBusy) return;
  const now=Date.now();
  if(weather && now-lastWxAt < 15*60*1000) return;   // still fresh
  if(now-lastWxTry < 60*1000) return;                // throttle (incl. retries on failure)
  lastWxTry=now; wxBusy=true;
  const u=`https://api.open-meteo.com/v1/forecast?latitude=${enc(lat)}&longitude=${enc(lon)}&current=temperature_2m,weather_code&temperature_unit=${units==="c"?"celsius":"fahrenheit"}&timezone=${enc(tz)}`;
  try{
    const r=await fetch(u,{cache:"no-store",referrerPolicy:"no-referrer"});
    const j=await r.json();
    if(j&&j.current&&j.current.weather_code!=null){
      weather={code:j.current.weather_code, temp:Math.round(j.current.temperature_2m)};
      lastWxAt=Date.now();
      try{ localStorage.setItem(wxKey,JSON.stringify({w:weather,ts:lastWxAt})); }catch(e){}
    }
  }catch(e){}
  finally{ wxBusy=false; }
}
// WMO weather code (+ day/night) -> condition / emoji / label
function wxInfo(code, day){
  const c=code;
  if(c==null||c===0)   return {cond:"clear",   icon:day?"☀️":"🌙", label:day?"Clear":"Clear night"};
  if(c===1||c===2)     return {cond:"cloud",   icon:day?"⛅":"☁️", label:"Partly cloudy"};
  if(c===3)            return {cond:"cloud",   icon:"☁️",  label:"Overcast"};
  if(c===45||c===48)   return {cond:"fog",     icon:"🌫️", label:"Fog"};
  if(c>=51&&c<=57)     return {cond:"rain",    icon:"🌦️", label:"Drizzle"};
  if(c>=61&&c<=67)     return {cond:"rain",    icon:"🌧️", label:"Rain"};
  if(c>=71&&c<=77)     return {cond:"snow",    icon:"🌨️", label:"Snow"};
  if(c>=80&&c<=82)     return {cond:"rain",    icon:"🌦️", label:"Showers"};
  if(c===85||c===86)   return {cond:"snow",    icon:"🌨️", label:"Snow showers"};
  if(c>=95)            return {cond:"thunder", icon:"⛈️", label:"Thunderstorm"};
  return {cond:"clear", icon:day?"☀️":"🌙", label:"—"};
}
// daytime = between Sunrise and Sunset, straight from the prayer data
function isDayNow(nowMin){
  if(!today) return true;
  const sr=mins(today.timings.Sunrise);
  const ss=mins(today.timings.Sunset||today.timings.Maghrib);
  return nowMin>=sr && nowMin<ss;
}
function applyTheme(nowMin){
  const day=isDayNow(nowMin);
  const info=wxInfo(weather?weather.code:null, day);
  const key=(info.cond==="clear"||info.cond==="cloud") ? info.cond+(day?"Day":"Night") : info.cond;
  $(".c").dataset.theme=key;
  const el=$("#wx");
  el.title=info.label;
  el.innerHTML = `<span class="i">${info.icon}</span>` + (weather ? `${weather.temp}°` : "");
}

// ---- state ---------------------------------------------------------------
let today=null, tomorrow=null, lastDate=null, fetchingTomorrow=false;
$("#loc").textContent = label;
$("#loc").style.display = label ? "" : "none";

function showError(msg){ $(".n").textContent="—"; $(".nt").textContent="—"; $(".left").textContent=msg; }

// figure out the next prayer + interval progress, all in tz minutes
function compute(){
  const n=nowParts();
  const nowMin=n.h*60+n.mi+n.s/60;
  const t=today.timings;
  const list=real.map(k=>({k,t:t[k],m:mins(t[k])}));
  const i=list.findIndex(x=>x.m>nowMin);

  if(i>=0){
    const next=list[i];
    const prevMin = i>0 ? list[i-1].m : list[list.length-1].m-1440; // before Fajr → prev is Isha (yesterday)
    return {next:{k:next.k,t:next.t,tomorrow:false}, nowMin, leftMin:next.m-nowMin,
            progress:clamp((nowMin-prevMin)/(next.m-prevMin)), needTomorrow:false};
  }
  // after Isha → next is tomorrow's Fajr
  const ft = tomorrow ? tomorrow.timings.Fajr : t.Fajr;
  const nextMin = mins(ft)+1440;
  const prevMin = list[list.length-1].m; // Isha today
  return {next:{k:"Fajr",t:ft,tomorrow:true}, nowMin, leftMin:nextMin-nowMin,
          progress:clamp((nowMin-prevMin)/(nextMin-prevMin)), needTomorrow:true};
}
function clamp(x){ return Math.min(1,Math.max(0,x)); }

function render(){
  if(!today) return;
  const c=compute();

  if(c.needTomorrow && !tomorrow && !fetchingTomorrow){
    fetchingTomorrow=true;
    fetchTimings(tomorrowStr()).then(d=>{tomorrow=d;fetchingTomorrow=false;}).catch(()=>{fetchingTomorrow=false;});
  }

  const t=today.timings;
  const onKey = c.next.tomorrow ? null : c.next.k;
  $(".n").textContent  = c.next.k;
  $(".nt").textContent = fmt(c.next.t);
  $(".left").textContent = formatLeft(c.leftMin);
  $(".bar>i").style.width = (c.progress*100).toFixed(1)+"%";
  $(".times").innerHTML = prayers.map(k=>{
    const on   = k===onKey;
    const past = mins(t[k])<=c.nowMin && !on;
    return `<div class="p ${on?"on":""} ${past?"past":""}"><b>${k}</b><span class="tm">${fmt(t[k])}</span></div>`;
  }).join("");
  const g=today.date&&today.date.gregorian, h=today.date&&today.date.hijri;
  $("#ce").innerHTML = g ? `${fmtDate(g)}<span class="er">CE</span>` : "";
  $("#ah").innerHTML = h ? `${fmtDate(h)}<span class="er">AH</span>` : "";
  applyTheme(c.nowMin);
}

function tick(){
  const n=nowParts();
  if(lastDate && n.dateStr!==lastDate){           // crossed midnight → load the new day
    tomorrow=null;
    fetchTimings(n.dateStr).then(d=>{today=d;saveCache(n.dateStr,d);}).catch(()=>{});
  }
  lastDate=n.dateStr;
  fetchWeather();          // self-throttling; refreshes ~every 15 min
  render();
}

async function boot(){
  if(!lat||!lon){ showError("Add lat & lon to the URL"); return; }
  loadWx();                // instant weather from cache, if any
  fetchWeather();          // refresh in the background
  const ds=nowParts().dateStr;
  const cached=loadCache(ds);
  if(cached){ today=cached; lastDate=ds; render(); }   // instant paint from cache
  try{
    today=await fetchTimings(ds);
    saveCache(ds,today);
    lastDate=ds;
    render();
  }catch(e){
    if(!today) showError("Could not load prayer times");
  }
  setInterval(tick,1000);
}

boot();
</script>
</body>
</html>
